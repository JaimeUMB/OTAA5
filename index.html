/* ═══════════════════════════════════════════════════
   SHEET
═══════════════════════════════════════════════════ */
function openSheet(html){
  $('#sh-body').innerHTML=html;
  $('#sheet-ov').classList.add('open');
  document.body.classList.add('sheet-open');
  lucide.createIcons();
}
function maybeCloseSheet(e){if(e.target===$('#sheet-ov'))closeSheet();}
function closeSheet(){
  $('#sheet-ov').classList.remove('open');
  document.body.classList.remove('sheet-open');
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
function showToast(msg='Saved!'){
  const t=$('#toast'); t.querySelector('span').textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400);
}

/* ═══════════════════════════════════════════════════
   COUNT-UP
═══════════════════════════════════════════════════ */
function countUp(el,target,dec=0,dur=650){
  if(!el) return;
  const s=performance.now();
  const step=n=>{
    const p=Math.min((n-s)/dur,1), e=1-Math.pow(1-p,3);
    el.textContent=dec?+(target*e).toFixed(dec):(Math.round(target*e)).toLocaleString();
    if(p<1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

/* ═══════════════════════════════════════════════════
   ACTIVITY DETAIL CARD
═══════════════════════════════════════════════════ */
function actCard(a){
  // ── shared Notion-style property row ──────────────────────────────
  const propRow=(label,value)=>`
    <div style="display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);width:96px;flex-shrink:0">${label}</span>
      <span class="num" style="font-size:13px;color:var(--text)">${value}</span>
    </div>`;

  if(a.type==='run'){
    const props=[
      propRow('Date',fmtDate(a.date)),
      propRow('Distance',`${a.distance_km} km`),
      propRow('Time',fmtDur(a.duration_sec)),
      propRow('Pace',`${fmtPace(a.avg_pace_sec_per_km)} /km`),
      a.avg_hr?propRow('Avg HR',`${a.avg_hr} bpm`):'',
      a.elevation_m?propRow('Elevation',`${a.elevation_m} m`):''
    ].join('');
    return `<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px">
      ${props}
      ${a.notes?`<div style="font-size:12px;color:var(--text-2);font-style:italic;padding-top:10px">${a.notes}</div>`:''}
    </div>`;
  }

  // ── calisthenics ──────────────────────────────────────────────────
  if(a.type==='calisthenics'){
    const wt=a.workout_type||'Calisthenics';
    const isPrehab=wt==='Prehab';
    // Colour: Pull & Push=accent, Prehab=success/warning, legacy Push=purple
    const accentCol=wt==='Pull & Push'||wt==='Pull'||wt==='Strength A'?'var(--accent)':
                    isPrehab?(a.prehab_complete===false?'var(--warning)':'var(--success)'):
                    '#8b5cf6';

    // ── Exercise rows (Pull/Push) ─────────────────────────────
    const exRows=(a.exercises||[]).map(e=>{
      const prescription=e.type==='duration'
        ?`${e.sets_or_min||1} × ${e.reps||e.reps_or_duration||'—'} sec`
        :`${e.sets_or_min||e.sets||1} × ${e.reps||e.reps_or_duration||'—'}${e.kg?` @ ${e.kg} kg`:''}`;
      return `<div class="ac-ex-row">
        <span class="ac-ex-name">${e.name}</span>
        <span class="ac-ex-rx num">${prescription}</span>
      </div>`;
    }).join('');

    // ── Prehab: done vs missing rows ──────────────────────────
    let prehabDoneRows='', prehabMissRows='';
    if(isPrehab && Array.isArray(a.prehab_checked)){
      let allEx=[];
      PREHAB_WORKOUT.forEach(b=>b.items.forEach(it=>allEx.push(it)));
      const done=[], miss=[];
      allEx.forEach((it,i)=>(a.prehab_checked[i]?done:miss).push(it));
      prehabDoneRows=done.map(it=>`<div class="ac-ex-row">
        <span class="ac-ex-name" style="color:var(--text)">${it.name}</span>
        <span class="ac-ex-rx num">${it.rx}</span>
      </div>`).join('');
      prehabMissRows=miss.map(it=>`<div class="ac-ex-row">
        <span class="ac-ex-name" style="color:var(--text-3);text-decoration:line-through">${it.name}</span>
        <span class="ac-ex-rx num" style="color:var(--text-3)">${it.rx}</span>
      </div>`).join('');
    }

    const exSection=isPrehab
      ?`${prehabDoneRows?`<div class="ac-ex-section">
          <div class="ac-ex-hdr">Completed (${(a.prehab_checked||[]).filter(Boolean).length} / ${PREHAB_TOTAL})</div>
          ${prehabDoneRows}
        </div>`:''}
        ${prehabMissRows?`<div class="ac-ex-section" style="margin-top:10px">
          <div class="ac-ex-hdr" style="color:var(--warning)">Missing</div>
          ${prehabMissRows}
        </div>`:''}`
      :(exRows?`<div class="ac-ex-section"><div class="ac-ex-hdr">Exercises</div>${exRows}</div>`:'');

    return `<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:8px;height:8px;border-radius:50%;background:${accentCol};flex-shrink:0"></div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${accentCol}">${wt}</div>
        <div style="font-size:11px;color:var(--text-3);margin-left:auto">${fmtDate(a.date)}</div>
      </div>
      ${propRow('Type',wt)}
      ${propRow('Duration',a.duration_min+' min')}
      ${exSection?`<div style="margin-top:12px">${exSection}</div>`:''}
      ${a.notes?`<div style="font-size:12px;color:var(--text-2);font-style:italic;padding-top:10px">${a.notes}</div>`:''}
    </div>`;
  }

  // ── reading / writing / editing ─────────────────────────────────
  if(a.type==='reading'){
    const _at=a.activity_type||'reading';
    const _col=_at==='writing'?'var(--rd-purple)':_at==='editing'?'var(--success)':'var(--rd-blue)';
    const _lbl=_at==='writing'?'Writing':_at==='editing'?'Editing':'Reading';
    return `<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:8px;height:8px;border-radius:50%;background:${_col};flex-shrink:0"></div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${_col}">${_lbl}</div>
        <div style="font-size:11px;color:var(--text-3);margin-left:auto">${fmtDate(a.date)}</div>
      </div>
      ${propRow('Date',fmtDate(a.date))}
      ${propRow('Type',_lbl)}
      ${a.book_name?propRow('Book',a.book_name):''}
      ${_at==='reading'&&a.pages_read?propRow('Pages',a.pages_read+' pages'):''}
      ${_at==='writing'&&a.words_written?propRow('Words',(+a.words_written).toLocaleString()+' words'):''}
      ${propRow('Duration',a.duration_min+' min')}
      ${a.notes?`<div style="font-size:12px;color:var(--text-2);font-style:italic;padding-top:10px">${a.notes}</div>`:''}
    </div>`;
  }

  // ── strength ─────────────────────────────────────────────────────
  const exRows=(a.exercises||[]).map(e=>{
    const prescription=e.type==='duration'
      ?`${e.sets_or_min||e.sets||1} × ${e.reps||e.reps_or_duration||'—'} sec`
      :`${e.sets_or_min||e.sets||1} × ${e.reps||e.reps_or_duration||'—'}${e.kg?` @ ${e.kg} kg`:''}`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text);flex:1;padding-right:12px">${e.name}</span>
      <span class="num" style="font-size:12px;font-weight:600;color:var(--text-2);white-space:nowrap">${prescription}</span>
    </div>`;
  }).join('');
  return `<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div style="width:8px;height:8px;border-radius:50%;background:#8b5cf6;flex-shrink:0"></div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8b5cf6">${a.session_type||'Strength'}</div>
      <div style="font-size:11px;color:var(--text-3);margin-left:auto">${fmtDate(a.date)}</div>
    </div>
    ${propRow('Duration',a.duration_min+' min')}
    ${exRows?`<div style="margin-top:12px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:4px">Exercises</div>
      ${exRows}
    </div>`:''}
    ${a.notes?`<div style="font-size:12px;color:var(--text-2);font-style:italic;padding-top:10px">${a.notes}</div>`:''}
  </div>`;
}

// ── Session colour helper: mirrors PLANPILLCOLORS exactly ──────────────────
function getStripColor(sessionType, srType) {
  if (sessionType === 'LR')   return '#3b82f6';
  if (sessionType === 'RACE') return 'var(--accent)';
  if (sessionType === 'PP')   return 'var(--accent)';
  if (sessionType === 'SR' && srType) {
    const w = srType.replace(/\s+/g,'');
    const map = {
      Easy:         'var(--success)',
      EasyStrides:  'var(--success)',
      Shakeout:     'var(--success)',
      Tempo:        'var(--accent)',
      RacePace:     'var(--accent)',
      Intervals:    '#8b5cf6'
    };
    return map[w] || map[srType.split(' ')[0]] || 'var(--accent)';
  }
  return 'var(--accent)';
}

function renderHome(el){
  const wd=getWeekDates();
  const wActs=getActsForWeek(wd);
  const wkKm=wActs.filter(a=>a.type==='run').reduce((s,a)=>s+a.distance_km,0);
  const lngR=wActs.filter(a=>a.type==='run').reduce((mx,a)=>Math.max(mx,a.distance_km),0);
  // Monthly KPI: runs in the past 30 calendar days
  const _mo30=new Date(TODAY); _mo30.setDate(_mo30.getDate()-30);
  const _mo30Str=iso(_mo30);
  const moActs=AppState.activities.filter(a=>a.type==='run'&&a.date>=_mo30Str);
  const moKm=moActs.reduce((s,a)=>s+(a.distance_km||0),0);
  const moLng=moActs.reduce((mx,a)=>Math.max(mx,a.distance_km||0),0);
  const actDays=new Set(wActs.map(a=>a.date)).size;
  // Strava-style cadence estimator: steps = cadence (spm) × duration (min)
  // Cadence base = 165 spm at 6:00/km; ±0.08 spm per sec/km of pace deviation; clamped 150–190
  // Uses logged step_count when available, falls back to cadence model otherwise
  const wkSteps=wActs.filter(a=>a.type==='run'&&a.distance_km>0)
    .reduce((sum,a)=>{
      if(a.step_count>0)return sum+a.step_count;
      const pace=a.avg_pace_sec_per_km||(a.duration_sec&&a.distance_km?a.duration_sec/a.distance_km:360);
      const cadence=Math.max(150,Math.min(190,165+(360-Math.max(pace,180))*0.08));
      return sum+Math.round(cadence*(a.duration_sec/60));
    },0);
  // Run streak: consecutive plan-scheduled run sessions (SR+LR) completed, newest first
  const _sched=(window.APP&&window.APP.SCHEDULE)||[];
  const _todayStr=iso(TODAY);
  const _runDates=_sched.flatMap(wk=>(wk.sessions||[])
    .filter(s=>s&&(s.sessionType==='SR'||s.sessionType==='LR')&&s.date<=_todayStr)
    .map(s=>s.date)).sort((a,b)=>b.localeCompare(a));
  let runStreak=0;
  for(const _d of _runDates){
    const _lg=window.APP&&window.APP.getLog(_d);
    if(_lg&&_lg.completed) runStreak++; else break;
  }
  const wkKcal=wActs.reduce((s,a)=>s+calcKcal(a),0);
  const acwr=computeACWR();
  const kcalMethod=wActs.some(a=>a.avg_hr&&AppState.profile.rhr)?'Keytel HR-based':'ACSM Formula';

  const gd=new Date(AppState.profile.goal.goal_date+'T00:00:00');
  // Plan-indexed weeks to race: counts remaining plan weeks, not calendar days
  const _appSched=(window.APP&&window.APP.SCHEDULE)||[];
  let _curPlanWeekIdx=-1;
  for(let _i=0;_i<_appSched.length;_i++){
    const _monMs=new Date(_appSched[_i].startDate+'T00:00:00Z').getTime();
    if(TODAY.getTime()>=_monMs&&TODAY.getTime()<=_monMs+6*86400000){_curPlanWeekIdx=_i;break;}
  }
  const wkRem=_curPlanWeekIdx>=0
    ?Math.max(_appSched.length-_curPlanWeekIdx-1,0)
    :Math.max(Math.round((gd-TODAY)/(7*86400000)),0);
  // T8: Override ACWR label during planned taper phase (weeks 28-31).
  // Planned load reduction structurally drops ACWR < 0.8 — this is correct behaviour,
  // not undertraining (Impellizzeri et al. 2020). Show 'Taper 🌙' instead.
  if(_curPlanWeekIdx>=27){ acwr.label='Taper'; acwr.color='var(--text-2)'; }
  // CTL-based readiness: every logged session directly moves the needle via the PMC model.
  // replaces the mileage-rate formula (avg4/reqKm) which was profile-agnostic and perversely
  // decreased readiness % as race day approached even with consistent training.
  const { ctl_today: ctlToday, atl_today: atlToday, tsb_today: tsbToday } = computePMC();
  const ctlTgt = computeExpectedPeakCTL(); // dynamic: peak CTL this plan is designed to reach
  // rdPct = fitness (CTL) + freshness bonus (TSB) so taper doesn't look like regression.
  // TSB bonus max +15pp when TSB > 0, scales with TSB/ctlTgt (Mujika & Padilla 2003).
  const _tsbBonus = tsbToday > 0 ? Math.min(tsbToday / Math.max(ctlTgt,1) * 25, 15) : 0;
  const rdPct = Math.min(ctlToday / Math.max(ctlTgt, 1) * 100 + _tsbBonus, 100);
  // TSB = CTL − ATL: positive = fresh, negative = fatigued
  // TSB thresholds calibrated to sRPE-Foster scale (AU/day).
  // Derived from 31-week plan simulation: deloads ≈ −15, build ≈ −35, peak ≈ −43, taper ≥ +9
  const tsbLabel = tsbToday > 50  ? 'Race Ready'
    : tsbToday > 5   ? 'Fresh'
    : tsbToday > -30 ? 'Normal'
    : tsbToday > -50 ? 'Fatigued'
    :                  'Very Fatigued';
  // km readiness — both sides use the current calendar week (Mon–Sun) so they are comparable
  // and thisWeekKm updates immediately every time a run is logged.
  // UTC-safe: TODAY = UTC midnight, so getUTCDay() is exact; no local-tz shift
  const _cwDay=TODAY.getUTCDay(),_cwDfm=_cwDay===0?6:_cwDay-1;
  const _cwMs=TODAY.getTime()-_cwDfm*86400000;
  const curWkStart=new Date(_cwMs).toISOString().split('T')[0];      // Mon
  const curWkEnd  =new Date(_cwMs+7*86400000).toISOString().split('T')[0]; // next Mon
  // Actual km logged so far this calendar week
  const thisWeekKm = AppState.activities
    .filter(a => a.type === 'run' && a.date >= curWkStart && a.date < curWkEnd)
    .reduce((s, a) => s + (a.distance_km || 0), 0);
  // Plan target from APP.SCHEDULE (LR + SR km for this plan week, RACE excluded)
  // NEW: an explicit goals.weeklyKmTarget (> 0) overrides the plan-derived value.
  const _curSchedWk = _curPlanWeekIdx>=0 ? _appSched[_curPlanWeekIdx] : null;
  const _kmOverride = getGoal('weeklyKmTarget');
  const planWeekKm = _kmOverride > 0 ? _kmOverride : _curSchedWk
    ? (_curSchedWk.lr?.km||0) + (_curSchedWk.sr?.km||0) + (_curSchedWk.pc?.km||0)
    : AppState.plan
        .filter(p=>p.date>=curWkStart&&p.date<curWkEnd&&((p.target_distance_km??p.targetdistancekm??0)>0))
        .reduce((s,p)=>s+(p.target_distance_km??p.targetdistancekm??0),0);
  // 4-week historical average kept for reference display only (not used for the bar ratio)
  const avg4 = avgWeekKm(4);
  const kmPct = planWeekKm > 0 ? Math.min(thisWeekKm / planWeekKm * 100, 100) : 0;
  const kmStatus = planWeekKm === 0 ? 'No plan yet'
    : thisWeekKm >= planWeekKm        ? 'Week target met'
    : thisWeekKm >= planWeekKm * 0.8  ? 'Almost there'
    : thisWeekKm >= planWeekKm * 0.5  ? 'In progress'
    :                                   'Getting started';

  // Week strip
  const dLbls=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  // Build week strip from APP.SCHEDULE (marathon plan) not the internal plan
  // Index sessions by date for fast lookup (_appSched already declared above)
  const _sessByDate={};
  _appSched.forEach(function(wk){
    (wk.sessions||[]).forEach(function(s){ if(s&&s.date) _sessByDate[s.date]=s; });
  });

  // Colour map for run session types
  // Colors now handled by getStripColor() — mirrors plan PLANPILLCOLORS

  const wStripHtml=wd.map((d,i)=>{
    const acts=getActsForDate(d);
    const isT=d===isoToday();
    const dt=new Date(d+'T00:00:00');
    const planned=_sessByDate[d]||null;
    const loggedRun=acts.find(a=>a.type==='run');
    const loggedStr=acts.find(a=>a.type==='strength'||a.type==='calisthenics');

    let bg='var(--bg-3)', txtC='var(--text-3)', dotTxt=String(dt.getDate());
    // opacity applied to the dot only via low-alpha hex background
    let dotStyle='';

    if(planned){
      const st=planned.sessionType;
      const isRun=st==='LR'||st==='SR'||st==='RACE';
      const isStr=st==='PP';
      const runCol=getStripColor(st, planned.type);

      if(isRun){
        if(loggedRun){
          // Completed run — solid colour, show actual km
          bg=runCol; txtC='#fff';
          dotTxt=loggedRun.distance_km+'km';
        } else {
          // Planned run — tinted background, coloured text, show planned km
          const kmLbl=planned.km!=null?planned.km+'km':String(dt.getDate());
          // Hex alpha 33 ≈ 20% opacity fill — subtle but clearly a run day
          // Tinted background derived from the exact runCol — matches plan dot colours
          const hexCol=runCol==='#3b82f6'        ?'#3b82f633'
                      :runCol==='#8b5cf6'        ?'#8b5cf633'
                      :runCol==='var(--success)' ?'rgba(61,153,112,.18)'
                      :                           'rgba(232,71,10,.18)';
          bg=hexCol;
          txtC=runCol;
          dotTxt=kmLbl;
        }
      } else if(isStr){
        const strLbl='P&P';
        // 60% more transparent than run circles (bg × 0.40, text × 0.40)
        const strBgD ='rgba(232,71,10,.40)';
        const strBgP ='rgba(232,71,10,.07)';
        const strTxt ='rgba(232,71,10,.40)';
        if(loggedStr){
          bg=strBgD; txtC=strTxt;
          dotTxt=strLbl;
        } else {
          bg=strBgP; txtC=strTxt;
          dotTxt=strLbl;
          dotStyle='font-size:8px;';
        }
      }
    } else if(loggedRun){
      // Manually logged run not in plan
      bg=WK_COLORS[loggedRun.run_type]||'var(--accent)'; txtC='#fff';
      dotTxt=loggedRun.distance_km+'km';
    } else if(loggedStr){
      // Manually logged strength not in plan
      bg='rgba(139,92,246,.25)'; txtC='rgba(192,160,255,.9)';
      dotTxt='STR';
    }

    return `<div class="day-chip${isT?' today':''}" onclick="showDayPopover('${d}',this)">
      <span class="day-lbl">${dLbls[i]}</span>
      <div class="day-dot num" style="background:${bg};color:${txtC};font-size:9px;${dotStyle}">${dotTxt}</div>
    </div>`;
  }).join('');

  // Recent runs (last 2 only)
  const RUN_ZONE={'Recovery':'Z1','Easy':'Z2','Long Run':'Z2','Tempo':'Z4','Interval':'Z5','Race':'Race'};
  const RUN_ZONE_LBL={'Recovery':'Z1 Recovery','Easy':'Z2 Easy','Long Run':'Z2 Easy','Tempo':'Z4 Threshold','Interval':'Z5 Interval','Race':'Race'};
  const recentRuns=[...AppState.activities]
    .filter(a=>a.type==='run')
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,2);
  const feedHtml=recentRuns.map(a=>{
    const c=WK_COLORS[a.run_type]||'var(--accent)';
    const zone=RUN_ZONE_LBL[a.run_type]||'Z2 Easy';
    const dist=a.distance_km?`${(+a.distance_km).toFixed(1)} km`:'—';
    const pace=a.avg_pace_sec_per_km?fmtPace(a.avg_pace_sec_per_km)+'/km':'—';
    return `<div class="feed-card" onclick="showActSheet('${a.id}')">
      <div class="feed-icon" style="background:color-mix(in oklab,${c} 12%,var(--bg-3))"><i data-lucide="activity" style="width:17px;height:17px;color:${c}"></i></div>
      <div class="feed-body" style="min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
          <div class="feed-ttl" style="flex-shrink:0">${a.run_type}</div>
          <div class="num" style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap">${dist}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--text-2)">${fmtDateSh(a.date)}</span>
          <span style="color:var(--text-3);font-size:10px">·</span>
          <span class="num" style="font-size:11px;color:var(--text-2)">${pace}</span>
          <span style="color:var(--text-3);font-size:10px">·</span>
          <span style="font-size:11px;font-weight:600;color:${c}">${zone}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Spark data (8 weeks)
  const spkD=[],spkL=[];
  for(let w=7;w>=0;w--){
    // UTC-safe: step back w weeks in ms, find that week's Monday in UTC
    const _wMs=TODAY.getTime()-w*7*86400000;
    const _wDay=new Date(_wMs).getUTCDay(),_wDfm=_wDay===0?6:_wDay-1;
    const _wsMs=_wMs-_wDfm*86400000;
    const _wsIso=new Date(_wsMs).toISOString().split('T')[0];
    const _weIso=new Date(_wsMs+7*86400000).toISOString().split('T')[0];
    const _wKm=AppState.activities.filter(a=>a.type==='run'&&a.date>=_wsIso&&a.date<_weIso).reduce((s,a)=>s+(a.distance_km||0),0);
    spkD.push(_wKm); spkL.push(`W${8-w}`);
  }
  // y-axis scale + 8-week average for sparkline
  const spkMax=Math.max(...spkD,0);
  // Round up to nearest 5 km; minimum 10 so chart never collapses to a line
  const spkYMax=spkMax===0?10:Math.max(Math.ceil(spkMax/5)*5,5);
  // True 8-week average including zero weeks (honest representation)
  const spkAvg8=spkD.reduce((s,v)=>s+v,0)/8;

  // ── Calisthenics data (this week) ─────────────────────────────────────────
  const calActs = AppState.activities.filter(a => a.type==='calisthenics' && wd.includes(a.date));
  const calSessions = calActs.length;
  const calPullups  = calActs.reduce((s,a)=>s+(a.pullups||0),0);
  const calDips     = calActs.reduce((s,a)=>s+(a.dips||0),0);
  const calKcal     = calActs.reduce((s,a)=>s+Math.round((a.rpe||5)*0.5*(a.duration_min||30)/60*4*70),0);
  const calDayPullups = wd.map(d=>AppState.activities.filter(a=>a.type==='calisthenics'&&a.date===d).reduce((s,a)=>s+(a.pullups||0),0));
  const calDayDips    = wd.map(d=>AppState.activities.filter(a=>a.type==='calisthenics'&&a.date===d).reduce((s,a)=>s+(a.dips||0),0));
  // ── This-week workout type checks ────────────────────────────────────────
  const ppDone     = calActs.some(a=>a.workout_type==='Pull & Push'||a.workout_type==='Pull'||a.workout_type==='Push'||a.workout_type==='Strength A'||a.workout_type==='Strength B');
  const _prehabAct  = calActs.find(a=>a.workout_type==='Prehab');

/* ── DAY CHIP POPOVER ──────────────────────────────────────── */
const ZONE_COLOR={Z1:'var(--text-3)',Z2:'var(--success)',Z3:'#3b82f6',Z4:'var(--accent)',Z5:'#8b5cf6',Race:'var(--accent)'};
const ZONE_NAME={Z1:'Recovery',Z2:'Easy',Z3:'Marathon Pace',Z4:'Threshold',Z5:'Interval',Race:'Race'};
const ZONE_PZ_KEY={Z1:'Z1_recovery',Z2:'Z2_easy',Z3:'Z3_marathon',Z4:'Z4_threshold',Z5:'Z5_interval'};

function dpPaceRange(zone){
  const pz=AppState.paceZones||computePaceZones();
  const k=ZONE_PZ_KEY[zone]; if(!k) return null;
  const d=pz[k]; if(!d) return null;
  // lo = faster (lower sec/km), hi = slower (higher sec/km or Infinity)
  if(!isFinite(d.hi)) return '>'+fmtPace(d.lo)+' /km';
  return fmtPace(d.lo)+' \u2013 '+fmtPace(d.hi)+' /km';
}

function dpRow(label,value){
  return `<div class="dp-row"><span class="dp-lbl">${label}</span><span class="dp-val">${value}</span></div>`;
}

function showDayPopover(d,chip){
  document.querySelector('.day-popover')?.remove();
  const rect=chip.getBoundingClientRect();

  const week=APP.getWeekForDate(d);
  const sess=week?week.sessions.find(s=>s.date===d):null;
  const acts=getActsForDate(d);
  const logEntry=APP.getLog(d);

  // ── header ────────────────────────────────────────────────
  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dt=new Date(d+'T00:00:00');
  const dayLabel=DOW[dt.getDay()]+' · '+fmtDate(d);
  let html=`<div class="dp-hdr"><span class="dp-date">${dayLabel}</span><button class="dp-close" onclick="document.querySelector('.day-popover').remove()" aria-label="Close">×</button></div>`;

  // ── plan content ──────────────────────────────────────────
  if(sess){
    const st=sess.sessionType;
    if(st==='LR'||st==='SR'||st==='RACE'){
      const runType=st==='RACE'?'Marathon Race':st==='LR'?'Long Run':(sess.type||'Easy');
      const zone=sess.zone||'Z2';
      const km=sess.km;
      const zcol=ZONE_COLOR[zone]||'var(--accent)';
      const paceRange=dpPaceRange(zone);
      html+=dpRow('Type',runType);
      html+=dpRow('Zone',`<span class="dp-zone" style="background:${zcol}20;color:${zcol}">${zone} · ${ZONE_NAME[zone]||zone}</span>`);
      if(km) html+=dpRow('Distance',km+' km');
      if(paceRange) html+=dpRow('Pace',`<span class="num">${paceRange}</span>`);
    } else if(st==='PP'){
      html+=`<div class="dp-rest" style="text-align:left;color:var(--text)">Calisthenics — Pull & Push (Tuesday)</div>`;
    }
  } else {
    html+=`<div class="dp-rest">Rest day</div>`;
  }

  // ── logged summary ────────────────────────────────────────
  const runLogged=acts.find(a=>a.type==='run');
  if(logEntry?.completed||runLogged){
    let logLine='Logged';
    if(runLogged){
      logLine+=': '+runLogged.distance_km+' km';
      if(runLogged.avg_pace_sec_per_km) logLine+=' @ '+fmtPace(runLogged.avg_pace_sec_per_km)+'/km';
    } else logLine+=' ✓';
    html+=`<div class="dp-logged"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>${logLine}</div>`;
  }

  // ── render + position ─────────────────────────────────────
  const el=document.createElement('div');
  el.className='day-popover';
  el.innerHTML=html;
  document.body.appendChild(el);

  const W=228, GAP=6;
  let left=rect.left+rect.width/2-W/2;
  let top=rect.bottom+GAP;
  if(left<8) left=8;
  if(left+W>window.innerWidth-8) left=window.innerWidth-W-8;
  const elH=el.offsetHeight||160;
  if(top+elH>window.innerHeight-8) top=rect.top-elH-GAP;
  el.style.left=left+'px';
  el.style.top=top+'px';

  // close on outside click / Escape
  setTimeout(()=>{
    const h=e=>{
      if(!el.contains(e.target)&&!chip.contains(e.target)){el.remove();document.removeEventListener('click',h);}
    };
    document.addEventListener('click',h);
  },0);
  const esc=e=>{if(e.key==='Escape'){el.remove();document.removeEventListener('keydown',esc);}};
  document.addEventListener('keydown',esc);
}

function rdMonthStreak(actType,field,target){
  let streak=0,y=TODAY.getFullYear(),m=TODAY.getMonth()-1;
  if(m<0){m=11;y--;}
  for(let i=0;i<120;i++){
    const ms=`${y}-${String(m+1).padStart(2,'0')}`;
    const tot=AppState.activities.filter(a=>a.type==='reading'&&a.activity_type===actType&&a.date.startsWith(ms)).reduce((s,a)=>s+(a[field]||0),0);
    if(tot>=target){streak++;m--;if(m<0){m=11;y--;}}else break;}
  return streak;}
function rdWeekStreak(actType,field,target){function wkStart(d){const t=new Date(d);const day=t.getDay()||7;t.setDate(t.getDate()-day+1);return t;}function wkDates(d){const s=wkStart(d);const arr=[];for(let i=0;i<7;i++){const dd=new Date(s);dd.setDate(s.getDate()+i);arr.push(iso(dd));}return arr;}const curWk=wkDates(TODAY);const curTot=AppState.activities.filter(a=>a.type==='reading'&&a.activity_type===actType&&curWk.includes(a.date)).reduce((s,a)=>s+(a[field]||0),0);let streak=curTot>=target?1:0;const base=wkStart(TODAY);for(let i=1;i<520;i++){const ws=new Date(base);ws.setDate(base.getDate()-i*7);const wk=wkDates(ws);const tot=AppState.activities.filter(a=>a.type==='reading'&&a.activity_type===actType&&wk.includes(a.date)).reduce((s,a)=>s+(a[field]||0),0);if(tot>=target)streak++;else break;}return streak;}
function setRdType(type){
  document.querySelectorAll('#rd-activity-type-row .rd-type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===type));
  ['rd-fg-book','rd-fg-pages'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=type==='reading'?'':'none';});
  const w=document.getElementById('rd-fg-words');if(w)w.style.display=type==='writing'?'':'none';

function saveReading(e){
  e.preventDefault();
  const actType=document.querySelector('.rd-type-btn.active')?.dataset.type||'reading';
  const dur=parseInt(document.getElementById('rd-dur')?.value)||0;
  if(!dur){alert('Please enter a duration.');return;}
  const act={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),type:'reading',activity_type:actType,date:document.getElementById('rd-date').value,duration_min:dur,notes:(document.getElementById('rd-notes')?.value||'').trim()};
  if(actType==='reading'){act.book_name=(document.getElementById('rd-book')?.value||'').trim();act.pages_read=parseInt(document.getElementById('rd-pages')?.value)||0;}
  if(actType==='writing'){act.words_written=parseInt(document.getElementById('rd-words')?.value)||0;act.writing_subtype=document.querySelector('.rd-subtype-btn.active')?.dataset.subtype||'narrative_writing';}
  AppState.activities.push(act);saveState();
  showToast('Session saved!');setLogMode('reading');}

function calcPace(){
  const dist=parseFloat($('#rdist')?.value);
  const h=parseInt($('#dh')?.value||0),m=parseInt($('#dm')?.value||0),s=parseInt($('#ds')?.value||0);
  const sec=h*3600+m*60+s;
  const p=$('#rpace'); if(!p)return;
  const paceSecPerKm=(dist>0&&sec>0)?sec/dist:null;
  p.value=paceSecPerKm?fmtPace(paceSecPerKm)+' /km':'—';
  updateZoneFromPace(paceSecPerKm);
}

function updateZoneFromPace(paceSecPerKm){
  const zoneEl=$('#rpace-zone');
  const tableWrap=$('#pace-zone-table-wrap');
  const tbody=$('#pace-zone-rows');

  const pz=computePaceZones();
  // Zone boundaries (faster pace = lower sec/km)
  // Z5 Interval:  < Z5 hi
  // Z4 Threshold: Z5.hi – Z4.hi
  // Z3 Marathon:  Z4.hi – Z3.hi
  // Z2 Easy:      Z3.hi – Z2.hi  (note: gap Z3.hi–Z2.lo handled as Z2)
  // Z1 Recovery:  > Z2.hi
  const ZONES=[
    {key:'Z1',name:'Recovery', range:'> '+fmtPace(pz.Z2_easy.hi)+' /km',                                      color:'#94a3b8'},
    {key:'Z2',name:'Easy',     range:fmtPace(pz.Z2_easy.hi)+' – '+fmtPace(pz.Z2_easy.lo)+' /km',         color:'#3b82f6'},
    {key:'Z3',name:'Marathon', range:fmtPace(pz.Z3_marathon.hi)+' – '+fmtPace(pz.Z3_marathon.lo)+' /km', color:'#22c55e'},
    {key:'Z4',name:'Threshold',range:fmtPace(pz.Z4_threshold.hi)+' – '+fmtPace(pz.Z4_threshold.lo)+' /km',color:'#f97316'},
    {key:'Z5',name:'Interval', range:'< '+fmtPace(pz.Z5_interval.hi)+' /km',                                  color:'#ef4444'},
  ];

  if(tbody){
    tbody.innerHTML=ZONES.map(z=>
      '<tr>'
      +'<td style="padding:5px 6px;color:'+z.color+';font-weight:700;border-bottom:1px solid var(--border)">'+z.key+'</td>'
      +'<td style="padding:5px 6px;color:var(--text-2);border-bottom:1px solid var(--border)">'+z.name+'</td>'
      +'<td style="padding:5px 6px;text-align:right;color:var(--text);font-variant-numeric:tabular-nums;border-bottom:1px solid var(--border)">'+z.range+'</td>'
      +'</tr>'
    ).join('');
  }
  if(tableWrap) tableWrap.style.display='block';

  if(!zoneEl) return;
  if(!paceSecPerKm){ zoneEl.value='—'; zoneEl.style.color='var(--text-3)'; return; }

  // Detect zone
  let det='Z1';
  if(paceSecPerKm <= pz.Z5_interval.hi)       det='Z5';
  else if(paceSecPerKm <= pz.Z4_threshold.hi) det='Z4';
  else if(paceSecPerKm <= pz.Z3_marathon.hi)  det='Z3';
  else if(paceSecPerKm <= pz.Z2_easy.hi)      det='Z2';
  else                                          det='Z1';

  const NAMES={Z1:'Recovery',Z2:'Easy',Z3:'Marathon',Z4:'Threshold',Z5:'Interval'};
  const COLORS={Z1:'#94a3b8',Z2:'#3b82f6',Z3:'#22c55e',Z4:'#f97316',Z5:'#ef4444'};
  zoneEl.value=det+' · '+NAMES[det];
  zoneEl.style.color=COLORS[det]||'var(--accent)';
}

// normalise exercise name for fuzzy pull-up/dip matching
function normEx(n){ return n.toLowerCase().replace(/[-_–—\s]+/g,''); }

// Strict pull-up detector: matches only genuine pull-up/chin-up variations.
// Prevents exercises that merely contain the word "pull up" (e.g. "front lever pull up",
// "scapular pull-ups") from being counted in the pull-up widget.
function isPullup(name){
  // Normalise to lowercase with single spaces (keep spaces so we can check word position)
  const s = name.toLowerCase().replace(/[-_–—]+/g,' ').replace(/\s+/g,' ').trim();
  // Optional leading modifier(s) + pull-up / chin-up core + optional trailing tag
  return /^(weighted|bw|bodyweight|strict|kipping|assisted|band\s*assisted|ring|wide\s*grip|close\s*grip|neutral\s*grip|l\s*sit|chest\s*to\s*bar|eccentric|slow|negatives?|pronated|supinated|unilateral|archer|one\s*arm)?\s*(pull\s*up[s]?|chin\s*up[s]?)(\s+(emom|amrap|[+@\d].*))?$/i.test(s);
}

// Auto-save sets/reps edits back to the template in AppState
function swSaveExField(wid, exIdx, field, val) {
  var wks = AppState.savedWorkouts || [];
  for(var i = 0; i < wks.length; i++) {
    if(wks[i].id === wid) {

        wks[i].exercises[exIdx][field] = parsed;

      }
      return;
    }
  }
}

function swIncSet(uid) {
  var counts = window._swSetCounts = window._swSetCounts || {};
  // Always read current total from the label so edits to the sets input are respected
  var lbl   = document.getElementById('sw-lbl-' + uid);
  var total = lbl ? (parseInt(lbl.textContent.split('/')[1]) || 99) : 99;
  counts[uid] = Math.min((counts[uid] || 0) + 1, total);
  swUpdateCounter(uid, total);
}
function swDecSet(uid) {
  var counts = window._swSetCounts = window._swSetCounts || {};
  counts[uid] = Math.max((counts[uid] || 0) - 1, 0);
  // read total from the label text "0 / N sets"
  var lbl = document.getElementById('sw-lbl-' + uid);
  var total = lbl ? parseInt(lbl.textContent.split('/')[1]) || 99 : 99;
  swUpdateCounter(uid, total);
}

function swUpdateCounter(uid, total) {
  var counts  = window._swSetCounts || {};
  var done    = counts[uid] || 0;
  var item    = document.getElementById('sw-ex-' + uid);
  var minusBtn= document.getElementById('sw-minus-' + uid);
  var plusBtn = document.getElementById('sw-plus-' + uid);
  var lbl     = document.getElementById('sw-lbl-' + uid);
  var cb      = document.getElementById('sw-cb-' + uid);
  var dotsN   = Math.min(total, 8);

  // Update label
  if(lbl) lbl.textContent = done + ' / ' + total + ' sets';

  // Update dots
  for(var d = 0; d < dotsN; d++) {
    var dot = document.getElementById('sw-dot-' + uid + '-' + d);
    if(dot) dot.classList.toggle('done', d < done);
  }

  // Enable/disable buttons
  if(minusBtn) minusBtn.disabled = done <= 0;
  if(plusBtn)  plusBtn.disabled  = done >= total;

  // Auto-check and tint when all sets done
  var allDone = done >= total;
  if(item) item.classList.toggle('sets-done', allDone);
  if(cb && allDone && !cb.checked) { cb.checked = true; }
  if(cb && !allDone && cb.checked) { cb.checked = false; }
}

// Rebuild dots when user edits the sets input
function swRebuildDots(uid, newTotal) {
  var dotsWrap = document.getElementById('sw-dots-' + uid);
  var lbl      = document.getElementById('sw-lbl-' + uid);
  var counts   = window._swSetCounts = window._swSetCounts || {};
  if(!dotsWrap) return;
  newTotal = Math.max(1, parseInt(newTotal) || 1);
  // Clamp current done count to new total
  counts[uid] = Math.min(counts[uid] || 0, newTotal);
  var done  = counts[uid];
  // Update label immediately so swIncSet/swDecSet read the right total
  if(lbl) lbl.textContent = done + ' / ' + newTotal + ' sets';
  // Rebuild dot indicators
  var dotsN = Math.min(newTotal, 8);
  var html  = '';
  for(var d = 0; d < dotsN; d++)
    html += '<div class="sw-set-dot' + (d < done ? ' done' : '') + '" id="sw-dot-' + uid + '-' + d + '"></div>';
  dotsWrap.innerHTML = html;
  // Sync button states and item styling
  swUpdateCounter(uid, newTotal);
}

function swRpeInput(id, val) {

function saveWorkoutTemplate() {
  var btn = document.querySelector('.cal-type-btn.active');
  var wt  = btn ? btn.dataset.type : 'Pull & Push';
  if(wt === 'Prehab') { alert('Templates are for Pull & Push workouts only.'); return; }
  var exercises = [];
  for(var i = 0; i < calExCount; i++) {
    var nm = document.getElementById('can-' + i);
    if(!nm) continue;
    var n = nm.value.trim();
    if(!n) continue;
    var typeEl = document.getElementById('cat-' + i);
    var c1El   = document.getElementById('ca1-' + i);
    var c2El   = document.getElementById('ca2-' + i);
    var ldEl   = document.getElementById('cal-ld-' + i);
    var kgEl   = document.getElementById('cak-' + i);
    var exType = typeEl ? typeEl.value : 'sets';
    var c1     = parseInt(c1El ? c1El.value : 0) || 0;
    var c2     = parseInt(c2El ? c2El.value : 0) || 0;
    var load   = ldEl ? ldEl.value : 'bw';
    var kg     = (load === 'wt' && kgEl) ? (parseFloat(kgEl.value) || 0) : 0;
    exercises.push({ name: n, type: exType, sets_or_min: c1, reps: c2, load: load, kg: kg });
  }
  if(!exercises.length) { alert('Add at least one exercise before saving a template.'); return; }
  var notesEl = document.getElementById('cal-notes');
  var notes   = notesEl ? notesEl.value.trim() : '';
  if(!AppState.savedWorkouts) AppState.savedWorkouts = [];
  AppState.savedWorkouts.push({
    id: genId(),
    workout_type: wt,
    exercises: exercises,
    notes: notes,
    created: new Date().toISOString()
  });
  saveState();
  renderSavedWorkoutsList();
  showToast('Template saved!');
}

function renderSavedWorkoutsList() {
  var el = document.getElementById('sw-list-section');
  if(!el) return;
  var wks = AppState.savedWorkouts || [];
  if(!wks.length) {
    el.innerHTML = '<div class="sw-section">'
      + '<div class="sw-section-hdr">Saved Workouts</div>'
      + '<div class="sw-empty">No saved workouts yet — fill in a workout above and tap <strong>Save as Template</strong>.</div>'
      + '</div>';
    return;
  }
  var cards = '';
  for(var i = 0; i < wks.length; i++) {
    var w    = wks[i];
    var type = (w.workout_type || '').toLowerCase();
    var cls  = type.indexOf('pull')!==-1 ? 'pull' : type === 'push' ? 'push' : 'other';
    var lbl  = w.workout_type || 'WRK';
    var ec   = (w.exercises || []).length;
    var sub  = ec + ' exercise' + (ec !== 1 ? 's' : '');
    if(w.notes) sub += ' · ' + w.notes.substring(0, 36) + (w.notes.length > 36 ? '…' : '');
    cards += '<div class="sw-card" onclick="openSavedWorkout(\'' + w.id + '\')">'
      + '<div class="sw-card-ico ' + cls + '">' + lbl + '</div>'
      + '<div class="sw-card-body">'
        + '<div class="sw-card-name">' + w.workout_type + ' Workout</div>'
        + '<div class="sw-card-sub">' + sub + '</div>'
      + '</div>'
      + '<svg class="sw-card-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>'
      + '</div>';

function swToggleEx(uid) {

  if(!cb || !row) return;
  cb.checked = !cb.checked;
  row.classList.toggle('done', cb.checked);
}

function swCbChange(uid) {
  var cb  = document.getElementById('sw-cb-'  + uid);
  var row = document.getElementById('sw-ex-' + uid);
  if(row) row.classList.toggle('done', cb && cb.checked);

function closeSavedWorkoutOv() {
  var ov = document.getElementById('sw-ov');
  if(ov) ov.classList.remove('open');
}


document.addEventListener('click', function(e) {
  var btn = e.target && e.target.closest ? e.target.closest('.sw-delete-btn') : null;
  if(!btn) return;
  var ov = document.getElementById('sw-ov');
  var id = btn.getAttribute('data-swid') || (ov && ov.dataset ? ov.dataset.wid : '');
  if(!id) return;
  if(e.__swDeleteHandled) return;
  e.__swDeleteHandled = true;
  if(btn.hasAttribute('onclick')) return; // inline handler will run in normal browsers
  deleteSavedWorkout(id);

function completeSavedWorkout(id) {
  var wks = AppState.savedWorkouts || [];
  var w   = null;
  for(var i = 0; i < wks.length; i++) { if(wks[i].id === id) { w = wks[i]; break; } }
  if(!w) { alert('Workout not found.'); return; }

  var durEl  = document.getElementById('sw-dur-'   + id);
  var dur    = parseInt(durEl ? durEl.value : '0') || 45;

  var dateEl  = document.getElementById('sw-date-'  + id);
  var rpeEl   = document.getElementById('sw-rpe-'   + id);
  var notesEl = document.getElementById('sw-notes-' + id);
  var date    = (dateEl  && dateEl.value)  ? dateEl.value  : iso(TODAY);
  var rpe     = parseInt(rpeEl  ? rpeEl.value  : '5') || 5;
  var notes   = notesEl ? notesEl.value.trim() : '';

  // Collect exercises with any edited sets/reps from the overlay inputs
  var exercises = [];
  var exs = w.exercises || [];
  for(var i = 0; i < exs.length; i++) {
    var uid    = id + '-' + i;
    var sEl    = document.getElementById('sw-s-' + uid);
    var rEl    = document.getElementById('sw-r-' + uid);
    var newS   = sEl ? (parseInt(sEl.value) || exs[i].sets_or_min) : exs[i].sets_or_min;
    var newR   = rEl ? (parseInt(rEl.value) || exs[i].reps)        : exs[i].reps;
    exercises.push({
      name:        exs[i].name,
      type:        exs[i].type,
      sets_or_min: newS,
      reps:        newR,
      load:        exs[i].load,
      kg:          exs[i].kg
    });
  }

  var pullups = 0, dips = 0;
  for(var i = 0; i < exercises.length; i++) {
    var ex = exercises[i];
    if(isPullup(ex.name)) pullups += Math.max(ex.sets_or_min || 0, 1) * (ex.reps || 0);
    if(/dip/i.test(normEx(ex.name)))         dips    += Math.max(ex.sets_or_min || 0, 1) * (ex.reps || 0);
  }

  var act = {
    id:           genId(),
    type:         'calisthenics',
    date:         date,
    workout_type: w.workout_type,
    exercises:    exercises,
    pullups:      pullups,
    dips:         dips,
    duration_min: dur,
    rpe:          rpe,
    notes:        notes
  };
  act.load_score = computeSessionLoad(act);
  AppState.activities.push(act);
  generatePlan();
  saveState();
  closeSavedWorkoutOv();
  showToast('Workout logged!');
  navigate('#home');
}

function deleteSavedWorkout(id) {
  var ov = document.getElementById('sw-ov');
  var resolvedId = id || (ov && ov.dataset ? ov.dataset.wid : '') || '';
  if(!resolvedId) { showToast('Template not found.'); return; }
  // Store id for confirmDeleteTemplate to pick up — avoids any quote-escaping
  var shBody = document.getElementById('sh-body');
  if(shBody) shBody.dataset.pendingDeleteId = resolvedId;
  openSheet(
    '<div class="sh-ttl">Delete Template?</div>' +
    '<p style="font-size:14px;color:var(--text-2);margin-bottom:20px;line-height:1.55">' +
      'This will permanently remove the saved workout template. ' +
      'Your logged history will not be affected.' +
    '</p>' +
    '<button class="btn btn-full" ' +
      'style="background:#ef4444;color:#fff;border:none;border-radius:12px;' +
             'min-height:50px;font-size:15px;font-weight:700;cursor:pointer;' +
             'width:100%;margin-bottom:10px;" ' +
      'onclick="confirmDeleteTemplate()">' +
      'Delete Template' +
    '</button>' +
    '<button class="btn btn-secondary btn-full" ' +
      'style="margin-top:0" onclick="closeSheet()">' +
      'Cancel' +
    '</button>'
  );
}

function confirmDeleteTemplate() {
  var shBody = document.getElementById('sh-body');
  var id = shBody && shBody.dataset ? shBody.dataset.pendingDeleteId : '';
  if(!id) { closeSheet(); return; }
  AppState.savedWorkouts = (AppState.savedWorkouts || []).filter(function(w) { return w.id !== id; });
  saveState();
  if(shBody) shBody.dataset.pendingDeleteId = '';
  closeSheet();
  closeSavedWorkoutOv();
  renderSavedWorkoutsList();
  showToast('Template deleted.');
}

function saveCalisthenics(e){
  e.preventDefault();
  const dur=parseInt($('#cal-dur')?.value)||0;
  if(!dur){alert('Please enter a duration.');return;}
  const _wt=document.querySelector('.cal-type-btn.active')?.dataset.type||'Pull & Push';
  // ── Prehab: collect checkbox state, skip exercise builder ─────────
  if(_wt==='Prehab'){
    const cbs=document.querySelectorAll('#cal-prehab-section .ph-cb');
    const prehab_checked=[...cbs].map(cb=>cb.checked);
    const prehab_complete=prehab_checked.every(v=>v);
    const act={
      id:genId(),type:'calisthenics',
      date:$('#cal-date').value,
      workout_type:'Prehab',
      exercises:[],pullups:0,dips:0,
      duration_min:dur,
      rpe:parseInt($('#rpe-cal')?.value)||3,
      notes:$('#cal-notes')?.value.trim()||'',
      prehab_checked,prehab_complete
    };
    act.load_score=computeSessionLoad(act);
    AppState.activities.push(act);
    saveState();
    showToast('Prehab saved!');
    navigate('#home');
    return;
  }
  const exercises=[];
  for(let i=0;i<calExCount;i++){
    const nm=document.getElementById('can-'+i); if(!nm)continue;
    const n=nm.value.trim(); if(!n)continue;
    const type=document.getElementById('cat-'+i)?.value||'sets';
    const c1=parseInt(document.getElementById('ca1-'+i)?.value)||0;
    const c2=parseInt(document.getElementById('ca2-'+i)?.value)||0;
    const load=document.getElementById('cal-ld-'+i)?.value||'bw';
    const kg=load==='wt'?parseFloat(document.getElementById('cak-'+i)?.value)||0:0;
    exercises.push({name:n,type,sets_or_min:c1,reps:c2,load,kg});
  }
  const pullups=exercises.filter(ex=>isPullup(ex.name)).reduce((s,ex)=>s+Math.max(ex.sets_or_min,1)*(ex.reps||0),0);
  const dips   =exercises.filter(ex=>/dip/.test(normEx(ex.name))).reduce((s,ex)=>s+Math.max(ex.sets_or_min,1)*(ex.reps||0),0);
  const act={
    id:genId(),type:'calisthenics',
    date:$('#cal-date').value,
    workout_type:document.querySelector('.cal-type-btn.active')?.dataset.type||'Pull & Push',
    exercises,pullups,dips,
    duration_min:dur,
    rpe:parseInt($('#rpe-cal')?.value)||5,
    notes:$('#cal-notes')?.value.trim()||''
  };
  act.load_score=computeSessionLoad(act);
  AppState.activities.push(act);
  saveState();
  showToast('Session saved!');
  navigate('#home');
}

function saveStr(e){

      <div class="fg"><label class="fl">Duration (min)</label><input type="number" style="${fi}" id="ed-sdur" value="${a.duration_min||30}" min="1"></div>
      <div class="fg"><label class="fl">RPE <span id="ed-rpe-lbl" style="font-weight:400;color:var(--text-2)">${a.rpe||5}/10 \u2014 ${RPE_LBL[a.rpe||5]||''}</span></label>
        <input type="range" class="rpe-slider" id="ed-rpe" min="1" max="10" value="${a.rpe||5}" oninput="$('#ed-rpe-lbl').textContent=this.value+'/10 \u2014 '+(RPE_LBL[+this.value]||'')">
      </div>
      <div class="fg"><label class="fl">Notes</label><textarea style="${fi};resize:vertical" id="ed-notes" rows="2">${a.notes||''}</textarea></div>
      <button onclick="saveEditedStr('${id}')" class="btn btn-primary btn-full" style="margin-top:4px">Save changes</button>`;

  openSheet(html);
}

function saveEditedRun(id) {
  const dist = parseFloat($('#ed-dist')?.value);
  const h=parseInt($('#ed-dh')?.value||0), m=parseInt($('#ed-dm')?.value||0), s=parseInt($('#ed-ds')?.value||0);
  const sec = h*3600+m*60+s;
  if (!dist||!sec) { alert('Please enter distance and duration.'); return; }
  const idx = AppState.activities.findIndex(x=>x.id===id);
  if (idx===-1) return;
  const updated = { ...AppState.activities[idx],
    date:     $('#ed-date')?.value || AppState.activities[idx].date,
    run_type: document.querySelector('.run-type-btn.active')?.dataset.type||'Short Run',
    distance_km: dist, duration_sec: sec,
    avg_pace_sec_per_km: sec/dist,
    avg_hr:      parseInt($('#ed-hr')?.value)||null,
    elevation_m: parseInt($('#ed-elev')?.value)||0,
    step_count:  parseInt($('#ed-steps')?.value)||null,
    rpe:         parseInt($('#ed-rpe')?.value)||5,
    notes:       $('#ed-notes')?.value.trim()||''
  };
  updated.load_score = computeSessionLoad(updated);
  AppState.activities[idx] = updated;
  saveState(); adaptPlan(); closeSheet(); renderHistList(); showToast('Activity updated!');
}

function saveEditedStr(id) {
  const dur = parseInt($('#ed-sdur')?.value);
  if (!dur) { alert('Please enter duration.'); return; }
  const idx = AppState.activities.findIndex(x=>x.id===id);
  if (idx===-1) return;
  const orig = AppState.activities[idx];
  const isCal = orig.type === 'calisthenics';
  const updated = { ...orig,
    date:         $('#ed-date')?.value || orig.date,
    ...(isCal ? {workout_type: $('#ed-stype')?.value} : {session_type: $('#ed-stype')?.value}),
    duration_min: dur,
    rpe:          parseInt($('#ed-rpe')?.value)||5,
    notes:        $('#ed-notes')?.value.trim()||''
  };
  updated.load_score = computeSessionLoad(updated);
  AppState.activities[idx] = updated;
  saveState(); adaptPlan(); closeSheet(); renderHistList(); showToast('Activity updated!');
}

function confirmDeleteActivity(id) {
  const row = $(`#hist-row-${id}`);
  if (!row) return;
  const a = AppState.activities.find(x=>x.id===id);
  if (!a) return;
  const ttl = a.type==='run' ? a.run_type : (a.workout_type||a.session_type||'Activity');
  row.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;width:100%;gap:12px;flex-wrap:wrap;padding:4px 0">
    <div style="font-size:13px;color:var(--text)">${ttl} \u00b7 ${fmtDateSh(a.date)} \u2014 Delete this activity?</div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="executeDeleteActivity('${id}')" style="min-height:44px;padding:8px 16px;font-size:13px;font-weight:600;font-family:var(--font-ui);color:var(--error,#ef4444);background:transparent;border:1.5px solid var(--error,#ef4444);border-radius:8px;cursor:pointer">Confirm</button>
      <button onclick="cancelDeleteActivity('${id}')" style="min-height:44px;padding:8px 16px;font-size:13px;font-family:var(--font-ui);background:var(--bg-3);border:1px solid var(--border);border-radius:8px;cursor:pointer">Cancel</button>
    </div>
  </div>`;
}

function cancelDeleteActivity(id) { renderHistList(); }

function executeDeleteActivity(id) {
  const row = $(`#hist-row-${id}`);
  if (row) {
    row.style.cssText += ';transition:opacity 250ms ease,max-height 250ms ease;overflow:hidden;opacity:1;max-height:'+row.offsetHeight+'px';
    requestAnimationFrame(()=>{ row.style.opacity='0'; row.style.maxHeight='0'; });
  }
  setTimeout(()=>{
    AppState.activities = AppState.activities.filter(a=>a.id!==id);
    saveState(); adaptPlan(); renderHistList();
    showToast('Activity deleted');
  }, 260);
}

function openImport(){
  const rows=[];
  for(let i=0;i<14;i++){
    const d=new Date(TODAY); d.setDate(d.getDate()-i);
    rows.push({date:iso(d),lbl:d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})});
  }
  window._impRows=rows;
  const trs=rows.map((r,i)=>`<tr>
    <td style="white-space:nowrap;color:var(--text-2);padding:3px 3px">${r.lbl}</td>
    <td><select id="it-${i}" style="width:100%;padding:4px 5px;font-size:11px;font-family:var(--font-ui);background:var(--bg-2);border:1px solid var(--border);border-radius:4px;color:var(--text)">
      <option value="">—</option>${['Easy','Tempo','Interval','Long Run','Recovery','Race'].map(t=>`<option>${t}</option>`).join('')}
    </select></td>
    <td><input type="number" id="id-${i}" placeholder="km" step="0.1" style="width:52px;padding:4px 5px;font-size:11px;font-family:var(--font-ui);background:var(--bg-2);border:1px solid var(--border);border-radius:4px;color:var(--text)"></td>
    <td><input type="text" id="idu-${i}" placeholder="mm:ss" style="width:62px;padding:4px 5px;font-size:11px;font-family:var(--font-ui);background:var(--bg-2);border:1px solid var(--border);border-radius:4px;color:var(--text)"></td>
    <td><input type="number" id="ir-${i}" placeholder="5" min="1" max="10" style="width:38px;padding:4px 5px;font-size:11px;font-family:var(--font-ui);background:var(--bg-2);border:1px solid var(--border);border-radius:4px;color:var(--text)"></td>
  </tr>`).join('');
  openSheet(`<div class="sh-ttl">Import past runs</div>
    <p style="font-size:12px;color:var(--text-2);margin-bottom:12px">Fill in runs to add. Empty rows are skipped.</p>
    <div style="overflow-x:auto"><table class="imp-table"><thead><tr><th>Date</th><th>Type</th><th>Dist</th><th>Time</th><th>RPE</th></tr></thead><tbody>${trs}</tbody></table></div>
    <button onclick="doImport(${rows.length})" class="btn btn-primary btn-full" style="margin-top:14px">Save all</button>`);
}
function doImport(n){
  const rows=window._impRows||[]; let saved=0;
  rows.forEach((r,i)=>{
    const t=$(`#it-${i}`)?.value, d=parseFloat($(`#id-${i}`)?.value);
    if(!t||!d)return;
    const durStr=$(`#idu-${i}`)?.value||'';
    let sec=0;
    if(durStr.includes(':')){const p=durStr.split(':').map(Number);sec=p.length===2?p[0]*60+p[1]:p[0]*3600+p[1]*60+(p[2]||0);}
    if(!sec) sec=d*360;
    const _rawDate=r.date||isoToday();
    const _normDate=(()=>{const p=_rawDate.split('-');return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0');})();
    AppState.activities.push({id:genId(),type:'run',date:_normDate,run_type:t,distance_km:d,duration_sec:sec,avg_pace_sec_per_km:sec/d,avg_hr:null,rpe:parseInt($(`#ir-${i}`)?.value)||5,elevation_m:0,notes:'Imported'});
    saved++;
  });
  if(saved){ generatePlan(); saveState(); closeSheet(); showToast(`${saved} run${saved>1?'s':''} imported!`); renderHistList(); }
}

function _adaptBannerHtml(){
  const F   = AppState.adaptFlags || {};
  const log = AppState.adaptLog || [];
  if (!log.length) return '';
  if (F.bannerDismissedId && F.bannerDismissedId === log[0].id) return '';
  const top = log[0];
  const unreachable = F.realisticCtlTarget && F.originalCtlTarget;
  const sub = unreachable
    ? `Your original peak CTL target of ${F.originalCtlTarget} AU/day is no longer safely reachable by ${fmtDateSh(AppState.profile.goal.goal_date)}. Realistic target: <strong>${F.realisticCtlTarget} AU/day</strong>. Tap for the full history.`
    : `${top.change}. Tap for the full history.`;
  return `<div class="adapt-banner" id="adapt-banner">
    <span class="badge" style="background:var(--warning);color:#fff;font-size:10px;flex-shrink:0;margin-top:1px">Plan adjusted</span>

function renderPlan(el){

  }
  const _gdStr=AppState.profile.goal.goal_date;

  const _dayDiff=Math.round((new Date(_gdStr+'T00:00:00Z')-new Date(_todStr+'T00:00:00Z'))/_msPerDay);
  const wLeft=Math.max(Math.ceil(_dayDiff/7),0);

function markPlanDone(id,type){
  const pool=type==='calisthenics'?AppState.calPlan:AppState.plan;
  const item=pool.find(p=>p.id===id); if(!item)return;
  item.completed=true; item.completed_date=isoToday();
  if(type==='calisthenics'&&item.workout_type!=='Prehab'){
    const isPull=item.workout_type==='Pull';
    const srcExs=isPull?STR_A_EXERCISES:STR_B_EXERCISES;
    const exercises=srcExs.map(ex=>({
      name:ex.name, type:ex.type||'sets',
      sets_or_min:ex.sets, reps:parseInt(ex.reps)||0, load:'bw', kg:0
    }));
    const pullups=exercises
      .filter(ex=>isPullup(ex.name))
      .reduce((s,ex)=>s+Math.max(ex.sets_or_min||0,1)*(ex.reps||0),0);
    const dips=exercises
      .filter(ex=>/dip/i.test(normEx(ex.name)))
      .reduce((s,ex)=>s+Math.max(ex.sets_or_min||0,1)*(ex.reps||0),0);
    const act={
      id:genId(), type:'calisthenics', date:isoToday(),
      workout_type:item.workout_type,
      exercises, pullups, dips,
      duration_min:60, rpe:5, notes:'Completed from plan'
    };
    act.load_score=computeSessionLoad(act);
    AppState.activities.push(act);
  }
  generatePlan(); saveState(); showToast('Workout logged!'); navigate('#home');
}

function renderMonthCal(){
  const yr=planMo.getFullYear(), mo=planMo.getMonth();
  const lbl=$('#cal-mo-lbl'); if(lbl) lbl.textContent=planMo.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const first=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const off=(first+6)%7;
  const grid=$('#cal-grid'); if(!grid)return;
  let html='';
  for(let i=0;i<off;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===iso(TODAY);
    const acts=getActsForDate(ds);
    const plan=AppState.plan.find(p=>p.date===ds);
    let bg='transparent', dotC=null;
    if(acts.length){
      const run=acts.find(a=>a.type==='run'), str=acts.find(a=>a.type==='strength');
      const wt=run?run.run_type:'Strength';
      bg=(WK_COLORS[wt]||'var(--text-3)')+'2a'; dotC=WK_COLORS[wt]||'var(--text-3)';
    } else if(plan&&plan.workout_type!=='Rest'){
      bg=(WK_COLORS[plan.workout_type]||'var(--bg-3)')+'1a';
      dotC=(WK_COLORS[plan.workout_type]||'var(--text-3)')+'88';
    }
    html+=`<div class="cal-day${isT?' today':''}" style="background:${bg}" onclick="showPlanDay('${ds}')">
      <span class="cal-day-n" style="color:${isT?'var(--accent)':'var(--text)'}">${d}</span>
      ${dotC?`<div class="cal-day-dot" style="background:${dotC}"></div>`:''}
    </div>`;
  }
  grid.innerHTML=html;
}

function planPrev(){ planMo.setMonth(planMo.getMonth()-1); renderMonthCal(); }
function planNext(){ planMo.setMonth(planMo.getMonth()+1); renderMonthCal(); }

  openSheet(html);

function tskId(){ return 't'+Date.now()+Math.random().toString(36).slice(2,6); }

function tskGetList(){
  const T=AppState.tasks;
  return T.lists[T.activeList]||T.lists[0];
}

function tskSortItems(items){
  const s=AppState.tasks.sort||'manual';
  const todo=items.filter(i=>!i.done);
  const done=items.filter(i=>i.done);
  if(s==='alpha') todo.sort((a,b)=>a.title.localeCompare(b.title));
  if(s==='due'){
    todo.sort((a,b)=>{
      if(!a.due&&!b.due)return 0;
      if(!a.due)return 1;
      if(!b.due)return -1;
      return a.due.localeCompare(b.due);
    });
  }
  return {todo,done};
}

function tskFmtDue(due){
  if(!due)return null;
  const today=isoToday();
  const d=new Date(due+'T00:00:00');
  const label=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  if(due<today) return {label,cls:'overdue'};
  if(due===today) return {label:'Today',cls:'today'};
  return {label,cls:''};
}

function donePillHtml(item){
  const priDot=item.priority?`<span class="tsk-pri-dot tsk-pri-${item.priority}" style="flex-shrink:0"></span>`:'';
  const safeTitle=item.title.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const dateStr=item.completedAt
    ?`<span class="tsk-done-pill-date">${new Date(item.completedAt+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>`
    :'';
  return `<div class="tsk-done-pill">
    <button class="tsk-done-pill-body" onclick="tskOpenSheet('${item.id}')" title="View details">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10" style="flex-shrink:0;color:var(--success)"><polyline points="1 6 4.5 9.5 11 2.5"/></svg>
      <span class="tsk-done-pill-lbl">${safeTitle}</span>
      ${priDot}${dateStr}
    </button>
    <button class="tsk-done-pill-restore" onclick="tskToggle('${item.id}')" title="Restore task" aria-label="Restore task">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>`;
}

function tskDeleteList(i){

  if(T.lists.length<=1){showToast('Cannot delete the only list');return;}
  if(!confirm('Delete list "'+T.lists[i].name+'"?'))return;
  T.lists.splice(i,1);

function tskReorderItems(fromId, toId) {
  if (fromId === toId) return;
  const list = tskGetList();
  const todo = list.items.filter(i => !i.done);
  const done = list.items.filter(i => i.done);
  const fi = todo.findIndex(i => i.id === fromId);
  const ti = todo.findIndex(i => i.id === toId);
  if (fi === -1 || ti === -1) return;
  const [moved] = todo.splice(fi, 1);
  todo.splice(ti, 0, moved);
  list.items = [...todo, ...done];
  saveState(); tskRerender();
}
function tskSubReorderItems(itemId, fromSubId, toSubId) {
  if (fromSubId === toSubId) return;
  const list = tskGetList();
  const item = list.items.find(i => i.id === itemId);
  if (!item || !item.subtasks) return;
  const subs = item.subtasks;
  const fi = subs.findIndex(s => s.id === fromSubId);
  const ti = subs.findIndex(s => s.id === toSubId);
  if (fi === -1 || ti === -1) return;
  const [moved] = subs.splice(fi, 1);
  subs.splice(ti, 0, moved);
  saveState(); tskOpenSheet(itemId);
}


function _tskDragEngine(container, itemSel, dragAttr, onDrop) {
  if (!container) return;
  let dragId = null, touchTargetId = null, ghost = null, dragEl = null;
  // Remove previous listeners stored on container
  if (container._tskTM) document.removeEventListener('touchmove', container._tskTM);
  if (container._tskTE) document.removeEventListener('touchend',  container._tskTE);

  function clearState() {
    if (ghost) { ghost.remove(); ghost = null; }
    if (dragEl) { dragEl.style.opacity = ''; dragEl = null; }
    container.querySelectorAll('.tsk-drag-over').forEach(e => e.classList.remove('tsk-drag-over'));
  }
  function commit(fromId, toId) {
    clearState();
    if (fromId && toId && fromId !== toId) onDrop(fromId, toId);
    dragId = null; touchTargetId = null;
  }

  container.querySelectorAll(itemSel).forEach(item => {
    const id = item.getAttribute(dragAttr);
    if (!id) return;
    const handle = item.querySelector('.tsk-drag-handle');
    if (!handle) return;

    // ── HTML5 DnD (desktop) ──────────────────────────────
    handle.onmousedown = () => item.setAttribute('draggable','true');
    item.ondragstart = e => {
      dragId = id;
      item.classList.add('tsk-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    };
    item.ondragend = () => {
      item.removeAttribute('draggable');
      item.classList.remove('tsk-dragging');
      clearState(); dragId = null;
    };
    item.ondragover = e => {
      e.preventDefault();
      if (dragId && dragId !== id) {
        container.querySelectorAll('.tsk-drag-over').forEach(e => e.classList.remove('tsk-drag-over'));
        item.classList.add('tsk-drag-over');
        touchTargetId = id;
      }
    };
    item.ondrop = e => { e.preventDefault(); commit(dragId, id); };

    // ── Touch (iPhone / mobile) ──────────────────────────
    handle.ontouchstart = e => {
      e.preventDefault();
      dragId = id; dragEl = item;
      const rect = item.getBoundingClientRect();
      ghost = item.cloneNode(true);
      ghost.removeAttribute('id');
      Object.assign(ghost.style, {
        position:'fixed', pointerEvents:'none', opacity:'0.88', zIndex:'9999',
        width: rect.width+'px', top: rect.top+'px', left: rect.left+'px',
        background:'var(--bg-2)', boxShadow:'0 10px 28px rgba(0,0,0,.22)',
        borderRadius:'10px', transition:'none'
      });
      document.body.appendChild(ghost);
      item.style.opacity = '0.2';
    };
  });

  const onTM = e => {
    if (!ghost || !dragId) return;
    e.preventDefault();
    const t = e.touches[0];
    ghost.style.top = (t.clientY - 28) + 'px';
    ghost.style.display = 'none';
    const el = document.elementFromPoint(t.clientX, t.clientY);
    ghost.style.display = '';
    const hit = el && el.closest(itemSel);
    container.querySelectorAll('.tsk-drag-over').forEach(e => e.classList.remove('tsk-drag-over'));
    if (hit && hit.getAttribute(dragAttr) !== dragId) {
      hit.classList.add('tsk-drag-over');
      touchTargetId = hit.getAttribute(dragAttr);
    } else { touchTargetId = null; }
  };
  const onTE = () => { commit(dragId, touchTargetId); };

  container._tskTM = onTM; container._tskTE = onTE;
  document.addEventListener('touchmove', onTM, {passive:false});
  document.addEventListener('touchend',  onTE);
}
function tskInitDrag() {
  const c = document.getElementById('tsk-list-body');
  _tskDragEngine(c, '.tsk-item[data-drag-id]', 'data-drag-id',
    (from, to) => tskReorderItems(from, to));
}
function tskInitSubDrag(itemId) {
  const c = document.getElementById('tsk-sh-subs');
  _tskDragEngine(c, '.tsk-sh-sub-row[data-subdrag-id]', 'data-subdrag-id',
    (from, to) => tskSubReorderItems(itemId, from, to));
}

        </div>

          <span class="tsk-prop-lbl">Due Date</span>
          <div class="tsk-prop-val">
            <input class="tsk-prop-date" id="tsk-sh-due" type="date" value="${item.due||''}"
              onchange="tskShUpdate('${id}','due',this.value)">
          </div>
        </div>
      </div>
      <div class="tsk-sec-hdr">Notes</div>
      <div class="tsk-notes-card">
        <textarea class="tsk-notes-inp" id="tsk-sh-notes" rows="3"
          oninput="tskShUpdate('${id}','notes',this.value)"

      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;margin-top:4px">
        <span class="tsk-sec-hdr" style="margin:0">Subtasks</span>
        ${totalSubs?`<span style="font-size:11px;font-weight:500;color:var(--text-2)">${doneCount}/${totalSubs} done</span>`:''}

        <button class="tsk-detail-btn delete-btn" onclick="tskDeleteItem('${id}');closeSheet()" aria-label="Delete task">

          <span>Done</span>
        </button>
      </div>`);
    lucide.createIcons();
    tskInitSubDrag(id);
  }
  renderSheet();
}


function tskShUpdate(id,field,val){
  const list=tskGetList();
  const item=list.items.find(i=>i.id===id);
  if(item){item[field]=val;saveState();tskRerender();}
}

function tskSubToggle(itemId,subId){
  const list=tskGetList();
  const item=list.items.find(i=>i.id===itemId);
  if(!item)return;
  const sub=item.subtasks.find(s=>s.id===subId);
  if(sub){sub.done=!sub.done;saveState();}
  const row=document.getElementById('sub-'+subId);
  if(row){
    row.classList.toggle('done-row',sub.done);
    row.querySelector('.tsk-sub-check').classList.toggle('done',sub.done);
    const titleEl=row.querySelector('.tsk-sh-sub-inp')||row.querySelector('.tsk-sub-title-inp');
    if(titleEl) titleEl.classList.toggle('done',sub.done);
  }
  tskRerender();
}

function tskSubAdd(itemId){
  const inp=$('#tsk-sub-inp');
  const title=inp?inp.value.trim():'';
  if(!title)return;
  const list=tskGetList();
  const item=list.items.find(i=>i.id===itemId);
  if(!item)return;
  if(!item.subtasks)item.subtasks=[];
  const newSub={id:tskId(),title,done:false,due:'',priority:''};
  item.subtasks.push(newSub);
  saveState();
  const subsDiv=$('#tsk-sh-subs');
  if(subsDiv){
    subsDiv.insertAdjacentHTML('beforeend', tskSubHtml(itemId, newSub));
    lucide.createIcons();
    inp.value='';
    inp.focus();
  }
  tskRerender();
}

function tskSubDelete(itemId,subId){
  const list=tskGetList();
  const item=list.items.find(i=>i.id===itemId);
  if(!item)return;
  item.subtasks=item.subtasks.filter(s=>s.id!==subId);
  saveState();
  const el=document.getElementById('sub-'+subId);
  if(el)el.remove();
  tskRerender();
}

function tskSubSetTitle(itemId,subId,val){
  const v=val.trim();
  if(!v)return;
  const list=tskGetList();
  const item=list.items.find(i=>i.id===itemId);
  if(!item)return;
  const sub=item.subtasks.find(s=>s.id===subId);
  if(sub){sub.title=v;saveState();tskRerender();}
}
function tskSubSetDue(itemId,subId,val){
  const list=tskGetList();
  const item=list.items.find(i=>i.id===itemId);
  if(!item)return;
  const sub=item.subtasks.find(s=>s.id===subId);
  if(sub){sub.due=val;saveState();}
  tskRerender();
}

function tskSetPri(itemId, p){
  const list=tskGetList();
  const item=list.items.find(i=>i.id===itemId);
  if(!item)return;
  item.priority=p;
  saveState();
  const priRow=$('#tsk-sh-pri');
  if(priRow) priRow.querySelectorAll('.tsk-pri-chip').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  const dot=document.getElementById('tsk-sh-pri-dot');
  if(dot) dot.style.background=p?`var(--pri-${p})`:'var(--text-3)';
  tskRerender();
}

function tskSubSetPri(itemId, subId, p){
  const list=tskGetList();
  const item=list.items.find(i=>i.id===itemId);
  if(!item)return;
  const sub=item.subtasks.find(s=>s.id===subId);
  if(!sub)return;
  sub.priority=p;
  saveState();
  // Update only the buttons in that subtask row
  const subEl=document.getElementById('sub-'+subId);
  if(subEl){const sel=subEl.querySelector('.tsk-sub-pri-sel');if(sel){sel.value=p;sel.dataset.pri=p;}}
  tskRerender();
}

function tskDeleteItem(id){
  const list=tskGetList();
  list.items=list.items.filter(i=>i.id!==id);
  tskRerender();
  saveState();
}

  function card(id,icon,bg,name,tag,body){
