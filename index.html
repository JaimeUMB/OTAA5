  margin-bottom: 10px !important;
}
/* Last row: no bottom margin needed before the Add button */

}

/* Header label row inside each exercise card */
#pg-log #cal-form #cal-ex-list > [id^="cal-ex-"] > div:first-child {
  font-size: 9px !important;
  letter-spacing: .08em !important;
  font-weight: 700 !important;

/* ── END CALISTHENICS FULL REDESIGN ─────────────────────────────── */


/* ═══════════════════════════════════════════════════════════════════
   CALISTHENICS EXERCISE ROWS — MOBILE LAYOUT FIX (≤480px)

   Problem: 6-col grid (22px 1fr 78px 40px 40px 30px) leaves only
   ~68px for the name field on a 375px iPhone.

   Fix: Restructure into a 2-row layout on mobile:
     Row 1  ☐  [Exercise name ·············]  ✕
     Row 2     [Type ▼]  [ Sets ]  [ Reps ]

   Grid: 22px 1fr 1fr 1fr 30px
     - name spans cols 2–4 in row 1  → ~231px (vs 68px before)
     - type/sets/reps each get ~77px in row 2
   ═══════════════════════════════════════════════════════════════════ */

@media (max-width: 480px) {

  /* ── Hide column header labels row (misaligns with 2-row layout) */
  #pg-log #cal-form #cal-ex-list > [id^="cal-ex-"] > div:first-child {
    display: none !important;
  }

  /* ── Input row: switch to 5-col × 2-row grid ─────────────────── */
  #pg-log #cal-form #cal-ex-list > [id^="cal-ex-"] > div:nth-child(2) {
    display: grid !important;
    grid-template-columns: 22px 1fr 1fr 1fr 30px !important;
    grid-template-rows: auto auto !important;
    gap: 7px 6px !important;
    align-items: center !important;
    margin-bottom: 8px !important;
  }

  /* Row 1: ☐ [Name input spans cols 2-4] [✕] */
  #pg-log #cal-form #cal-ex-list input.ex-done-cb {
    grid-column: 1 !important;
    grid-row: 1 !important;
    align-self: center !important;
    justify-self: center !important;
  }
  #pg-log #cal-form #cal-ex-list input[id^="can-"] {
    grid-column: 2 / 5 !important;
    grid-row: 1 !important;
    width: 100% !important;
    font-size: 14px !important;
    padding: 10px 12px !important;
  }
  #pg-log #cal-form #cal-ex-list button.ex-del {
    grid-column: 5 !important;
    grid-row: 1 !important;
    align-self: center !important;
    justify-self: end !important;
    width: 30px !important;
    height: 36px !important;
    flex-shrink: 0 !important;
  }

  /* Row 2: [Type ▼] in col 2, [Sets] in col 3, [Reps] in col 4
     Col 1 + col 5 remain empty → creates visual indent on left */
  #pg-log #cal-form #cal-ex-list select[id^="cat-"] {
    grid-column: 2 !important;
    grid-row: 2 !important;
    width: 100% !important;
    font-size: 12px !important;
    padding: 8px 6px !important;
    text-align: center !important;
  }
  #pg-log #cal-form #cal-ex-list input[id^="ca1-"] {
    grid-column: 3 !important;
    grid-row: 2 !important;
    width: 100% !important;
    text-align: center !important;
    font-size: 14px !important;
    padding: 8px 4px !important;
  }
  #pg-log #cal-form #cal-ex-list input[id^="ca2-"] {
    grid-column: 4 !important;
    grid-row: 2 !important;
    width: 100% !important;
    text-align: center !important;
    font-size: 14px !important;
    padding: 8px 4px !important;
  }

  /* ── Load row: flex, full width, comfortable height ──────────── */
  #pg-log #cal-form #cal-ex-list > [id^="cal-ex-"] > div:last-child {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    flex-wrap: wrap !important;
  }
  #pg-log #cal-form #cal-ex-list select[id^="cal-ld-"] {
    flex: 1 !important;
    min-width: 120px !important;
    font-size: 13px !important;
    padding: 9px 10px !important;
  }

/* ═══════════════════════════════════════════════════════════════════
   PREHAB CHECKLIST — FULL AESTHETIC REDESIGN
   Matches the Pull/Push exercise row + sw-ex-item design language:
     · Progress header with pill counter
     · Block cards with colour-coded headers per block
     · Exercise rows: checkbox + name (flex) + rx badge on the right
     · Checked state: green row tint + strikethrough
     · Checkbox: 18px, green accent-color, rounded
   Block colour map (nth-child counts include progress header div):
     2 → Warm-Up           → amber  #f59e0b
     3 → Block A Shoulder  → blue   #3b82f6
     4 → Block B Hip       → green  var(--success)
     5 → Block C Arms      → purple #8b5cf6
     6 → Cool-Down         → teal   #0d9488
   ═══════════════════════════════════════════════════════════════════ */

/* ── PROGRESS HEADER row ─────────────────────────────────────────── */
#pg-log #cal-form #cal-prehab-section > div:first-child {

}
/* "Exercises" label → same uppercase style as all .fl labels */

  font-size: 11px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: .06em !important;
  color: var(--text-3) !important;
  margin-bottom: 0 !important;
}
/* Progress counter → pill badge */
#pg-log #cal-form .ph-progress {
  display: inline-flex !important;
  align-items: center !important;
  background: color-mix(in oklab, var(--success) 12%, var(--bg-2)) !important;
  color: var(--success) !important;
  border: 1px solid color-mix(in oklab, var(--success) 28%, var(--border)) !important;
  border-radius: 99px !important;
  padding: 3px 10px !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  font-variant-numeric: tabular-nums !important;
  letter-spacing: .02em !important;
  transition: background 200ms ease !important;
}

/* ── BLOCK CARDS ─────────────────────────────────────────────────── */
#pg-log #cal-form .ph-block {
  background: var(--bg) !important;
  border: 1.5px solid var(--border) !important;
  border-radius: 12px !important;
  padding: 0 !important;
  margin-bottom: 10px !important;
  overflow: hidden !important;
}

/* ── BLOCK HEADER — colour-coded per block ───────────────────────── */
#pg-log #cal-form .ph-block-hdr {
  font-size: 10px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: .08em !important;
  padding: 9px 14px !important;
  margin-bottom: 0 !important;
  border-bottom: 1px solid var(--border) !important;
  border-radius: 0 !important;
}

/* Warm-Up → amber */
#cal-prehab-section .ph-block:nth-child(2) .ph-block-hdr {
  color: #d97706 !important;
  background: color-mix(in oklab, #f59e0b 9%, var(--bg)) !important;
  border-bottom-color: color-mix(in oklab, #f59e0b 22%, var(--border)) !important;
}
/* Block A — Shoulder → blue */
#cal-prehab-section .ph-block:nth-child(3) .ph-block-hdr {
  color: #3b82f6 !important;
  background: color-mix(in oklab, #3b82f6 9%, var(--bg)) !important;
  border-bottom-color: color-mix(in oklab, #3b82f6 22%, var(--border)) !important;
}
/* Block B — Hip → green */
#cal-prehab-section .ph-block:nth-child(4) .ph-block-hdr {
  color: var(--success) !important;
  background: color-mix(in oklab, var(--success) 9%, var(--bg)) !important;
  border-bottom-color: color-mix(in oklab, var(--success) 22%, var(--border)) !important;
}
/* Block C — Arms → purple */
#cal-prehab-section .ph-block:nth-child(5) .ph-block-hdr {
  color: #8b5cf6 !important;
  background: color-mix(in oklab, #8b5cf6 9%, var(--bg)) !important;
  border-bottom-color: color-mix(in oklab, #8b5cf6 22%, var(--border)) !important;
}
/* Cool-Down → teal */
#cal-prehab-section .ph-block:nth-child(6) .ph-block-hdr {
  color: #0d9488 !important;
  background: color-mix(in oklab, #0d9488 9%, var(--bg)) !important;
  border-bottom-color: color-mix(in oklab, #0d9488 22%, var(--border)) !important;
}

/* ── EXERCISE ROWS ───────────────────────────────────────────────── */
#pg-log #cal-form .ph-item {
  display: flex !important;
  align-items: center !important;
  gap: 12px !important;
  padding: 11px 14px !important;
  border-bottom: 1px solid color-mix(in oklab, var(--border) 65%, transparent) !important;
  cursor: pointer !important;
  user-select: none !important;
  transition: background 140ms ease !important;
}
#pg-log #cal-form .ph-item:last-child {
  border-bottom: none !important;
}
#pg-log #cal-form .ph-item:hover {
  background: var(--bg-2) !important;
}
/* Checked row → green tint */
#pg-log #cal-form .ph-item:has(.ph-cb:checked) {
  background: color-mix(in oklab, var(--success) 7%, var(--bg)) !important;
}

/* ── CHECKBOX ────────────────────────────────────────────────────── */
#pg-log #cal-form .ph-cb {
  width: 18px !important;
  height: 18px !important;
  flex-shrink: 0 !important;
  accent-color: var(--success) !important;
  cursor: pointer !important;
  border-radius: 4px !important;
}

/* ── EXERCISE NAME + RX — flex row layout ────────────────────────── */
/* ph-name becomes a flex container so rx badge sits on the right */
#pg-log #cal-form .ph-name {
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  gap: 8px !important;
  flex: 1 !important;
  min-width: 0 !important;
  font-size: 14px !important;
  font-weight: 500 !important;
  color: var(--text) !important;
  transition: color 140ms ease !important;
  flex-wrap: wrap !important;
}
/* Checked → strikethrough + muted */
#pg-log #cal-form .ph-item:has(.ph-cb:checked) .ph-name {
  text-decoration: none !important; /* reset global rule */
  color: var(--text-3) !important;
}
/* Name text node: use ellipsis for very long names on mobile */
/* (applies naturally as the flex text node shrinks) */

/* ── RX BADGE — right-aligned prescription pill ──────────────────── */
#pg-log #cal-form .ph-rx {
  display: inline-flex !important;
  align-items: center !important;
  flex-shrink: 0 !important;
  background: var(--bg-2) !important;
  border: 1px solid var(--border) !important;
  border-radius: 99px !important;
  padding: 2px 9px !important;
  font-size: 11px !important;
  font-weight: 600 !important;
  color: var(--text-2) !important;
  white-space: nowrap !important;
  font-variant-numeric: tabular-nums !important;
  letter-spacing: .01em !important;
}
/* Hide the ' · ' separator (first 3 chars of .ph-rx content)
   by shrinking it to nothing, then show the rest via normal text.
   Can't remove HTML but can make the dot invisible: */
#pg-log #cal-form .ph-rx::before {
  content: '' !important;
  display: inline !important;
}
/* Checked → rx badge dims */
#pg-log #cal-form .ph-item:has(.ph-cb:checked) .ph-rx {
  opacity: 0.45 !important;
  text-decoration: line-through !important;
}

/* ── MOBILE: wrap rx below name if name is long ──────────────────── */
@media (max-width: 480px) {
  #pg-log #cal-form .ph-item {
    padding: 10px 12px !important;
    gap: 10px !important;

    font-size: 13px !important;

  }

    font-size: 10px !important;

  }

.kpi-row {

  letter-spacing: -.02em;
  line-height: 1.1;
}
.prof-hero-sub {
  font-size: 12px;
  color: var(--text-3);
  font-weight: 500;
  margin-top: 3px;
}

/* Grouped settings card */
.prof-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 20px;
  overflow: hidden;
}

/* Row inside prof-card */
.prof-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 140ms;
}
.prof-row:last-child { border-bottom: none; }
.prof-row:hover { background: var(--bg-3); }
.prof-row.no-hover { cursor: default; }
.prof-row.no-hover:hover { background: transparent; }

/* Icon inside row */
.prof-row-ico {
  width: 32px; height: 32px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Row text */
.prof-row-body { flex: 1; min-width: 0; }
.prof-key {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.prof-val {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.prof-chev { color: var(--text-3); flex-shrink: 0; }

/* Stat KPI grid — 2×2 */
.prof-kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.prof-kpi {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.prof-kpi-lbl {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
}
.prof-kpi-val {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -.03em;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.prof-kpi-sub {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
}

/* Fitness level pills — inside a prof-card */
.prof-pill-row {
  display: flex;
  gap: 8px;
  padding: 14px 16px;
  flex-wrap: wrap;
}
.prof-pill {
  flex: 1;
  min-width: 80px;
  padding: 9px 10px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-ui);
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: all 140ms;
  text-align: center;
}
.prof-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.prof-pill:not(.active):hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Danger zone button */
.prof-danger-btn {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-ui);
  border: 1.5px solid #ef4444;
  background: transparent;
  color: #ef4444;
  cursor: pointer;
  transition: all 140ms;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.prof-danger-btn:hover {
  background: color-mix(in oklab, #ef4444 8%, transparent);
}

/* ── END PROFILE REDESIGN ─────────────────────────────────────────── */


/* ═══════════════════════════════════════════════════════════════════
   WORKOUT TEMPLATE — SET COUNTER
   ═══════════════════════════════════════════════════════════════════ */

/* Exercise item becomes 2-row grid */
.sw-ex-item {
  display: grid !important;
  grid-template-columns: 20px 1fr auto !important;
  grid-template-rows: auto auto !important;
  align-items: center !important;
  gap: 0 10px !important;
  padding: 12px 14px !important;
  border-bottom: 1px solid var(--border) !important;
  transition: background 140ms !important;
  cursor: default !important;
}
.sw-ex-item:hover { background: var(--bg-3) !important; }

/* Row 1 col 1: checkbox */
.sw-ex-cb {
  grid-column: 1 !important;
  grid-row: 1 !important;
  pointer-events: auto !important;
  cursor: pointer !important;
}
/* Row 1 col 2: name */
.sw-ex-name {
  grid-column: 2 !important;
  grid-row: 1 !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  color: var(--text) !important;
}
/* Row 1 col 3: sets×reps edit */
.sw-ex-edit {
  grid-column: 3 !important;
  grid-row: 1 !important;
}

/* Row 2: set counter — spans cols 2-3 */
.sw-set-counter {
  grid-column: 2 / 4 !important;
  grid-row: 2 !important;
  display: flex !important;
  align-items: center !important;
  gap: 0 !important;
  margin-top: 8px !important;
}
.sw-set-btn {
  width: 30px !important;
  height: 30px !important;
  border-radius: 8px !important;
  border: 1.5px solid var(--border) !important;
  background: var(--bg-3) !important;
  color: var(--text-2) !important;
  font-size: 17px !important;
  font-weight: 700 !important;
  line-height: 1 !important;
  cursor: pointer !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  transition: all 140ms !important;
  flex-shrink: 0 !important;
  font-family: var(--font-ui) !important;
  user-select: none !important;
}
.sw-set-btn:hover:not(:disabled) {
  background: var(--bg-2) !important;
  border-color: var(--accent) !important;
  color: var(--accent) !important;
}
.sw-set-btn:disabled {
  opacity: .3 !important;
  cursor: not-allowed !important;
}
.sw-set-display {
  flex: 1 !important;
  text-align: center !important;
  font-size: 12px !important;
  font-weight: 700 !important;
  color: var(--text-2) !important;
  letter-spacing: .02em !important;
  font-variant-numeric: tabular-nums !important;
  padding: 0 8px !important;
}
/* Progress dots (one per planned set) */
.sw-set-dots {
  display: flex !important;
  gap: 4px !important;
  align-items: center !important;
  justify-content: center !important;
  flex-wrap: wrap !important;
}
.sw-set-dot {
  width: 7px !important;
  height: 7px !important;
  border-radius: 50% !important;
  border: 1.5px solid var(--border) !important;
  background: transparent !important;
  transition: all 200ms !important;
  flex-shrink: 0 !important;
}
.sw-set-dot.done {
  background: var(--success) !important;
  border-color: var(--success) !important;
  transform: scale(1.15) !important;
}

/* When all sets done — item gets success tint */
.sw-ex-item.sets-done {
  background: color-mix(in oklab, var(--success) 5%, var(--bg-2)) !important;
  border-color: color-mix(in oklab, var(--success) 15%, var(--border)) !important;
}
.sw-ex-item.sets-done .sw-ex-name {
  color: var(--text-3) !important;
  text-decoration: line-through !important;
}
.sw-ex-item.sets-done .sw-set-btn:not(.sw-set-minus) {
  background: var(--success) !important;
  border-color: var(--success) !important;
  color: #fff !important;
}

/* ── END SET COUNTER ──────────────────────────────────────────────── */


/* THIS MONTH inputs */
#tm-inputs .tm-field{display:flex;flex-direction:column;gap:3px}
#tm-inputs .tm-field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3)}
#tm-inputs .tm-field input{width:100%;padding:7px 9px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--text);font-family:var(--font-ui);font-variant-numeric:tabular-nums;outline:none;transition:border-color 140ms}
#tm-inputs .tm-field input:focus{border-color:var(--accent)}
/* ── PF SHEET FORM FIELDS ──────────────────────────── */
.pf-fi{width:100%;padding:7px 9px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--text);font-family:var(--font-ui);font-variant-numeric:tabular-nums;outline:none;transition:border-color 140ms;-webkit-appearance:none;appearance:none}
.pf-fi:focus{border-color:var(--accent)}
.pf-fi::placeholder{color:var(--text-3)}
.pf-fl{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:4px}
.pf-fg{margin-bottom:10px}
</style>

const TODAY = (() => {

// components, so it is correct across all timezones and across midnight.
function isoToday() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
} // alias used in generatePlan & markPlanDone

  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;

// ── Persistence ──────────────────────────────────────────────────────────────
const _SK = 'arete_v1';
const _store = (()=>{ try{ return window['local'+'Storage']; }catch(e){ return null; } })();

/* ═══════════════════════════════════════════════════
   NEW: PERSISTENCE LAYER (localStorage + optional Firestore)
   Every call site in the app still calls saveState() / loadState() exactly as
   before. The cloud is layered *underneath* those two functions so nothing
   above them had to change.
     • localStorage is always the source of truth and is written synchronously
       first, so a Firestore failure can never lose local data.
     • Firestore write is fire-and-forget; on failure the doc is queued and
       retried (backoff + on 'online').
     • With a blank firebaseConfig the whole cloud path is inert and the app
       runs purely on localStorage, exactly as it does today.
═══════════════════════════════════════════════════ */

// NEW: serialise the persisted slice of AppState (single object, one doc/user).
function _serializeState() {
  return {
    profile:    AppState.profile,
    activities: AppState.activities,
    plan:       AppState.plan,
    calPlan:    AppState.calPlan,
    adaptFlags: AppState.adaptFlags,
    adaptLog:   AppState.adaptLog ?? [],
    tasks:      AppState.tasks,
    pfDoc:      AppState.pfDoc??{title:'',body:''},
    pfFinance:  AppState.pfFinance??null,
    journal:    AppState.journal??[],
    savedWorkouts: AppState.savedWorkouts??[],
    ui: {
      theme:     AppState.ui.theme,
      onboarded: AppState.ui.onboarded,
      homeMode:  AppState.ui.homeMode,
      logMode:   AppState.ui.logMode
    },
    _updatedAt: Date.now()
  };
}

// NEW: synchronous localStorage write — unchanged semantics from the old saveState.
function _saveLocal(payload) {
  if (!_store) return false;
  try { _store.setItem(_SK, JSON.stringify(payload)); return true; }
  catch(e) { console.warn('Arete: could not save state', e); return false; }
}

// NEW: offline-safe retry queue for the Firestore write.
let _cloudPending = null;   // last payload that failed to reach Firestore
let _cloudRetryTimer = null;
let _cloudRetryDelay = 5000;
function _queueCloudRetry(payload) {
  _cloudPending = payload;                       // last-write-wins; never lost locally
  if (_cloudRetryTimer) return;
  _cloudRetryTimer = setTimeout(async () => {
    _cloudRetryTimer = null;
    const p = _cloudPending;
    if (!p) return;
    // FIX: if the user signed out (or cloud was torn down) while a retry was
    // pending, _saveCloud() returns false forever and the old code rescheduled
    // itself indefinitely at the 120 s cap — a leaked repeating timer. There is
    // nowhere to sync to when signed out, and localStorage is already
    // authoritative, so drop the queue instead of spinning.
    const C = window.Cloud;
    if (!C || !C.ready || !C.user) { _cloudPending = null; _cloudRetryDelay = 5000; return; }
    const ok = await _saveCloud(p, true);
    if (ok) { _cloudPending = null; _cloudRetryDelay = 5000; }
    else    { _cloudRetryDelay = Math.min(_cloudRetryDelay*2, 120000); _queueCloudRetry(p); }
  }, _cloudRetryDelay);
}
if (typeof window !== 'undefined') {
  window.addEventListener('online', () => {                       // NEW
    if (_cloudPending) { _cloudRetryDelay = 1000; if(!_cloudRetryTimer) _queueCloudRetry(_cloudPending); }
  });
}

// NEW: Firestore write. No-ops (returns false) when cloud is off / signed out.
async function _saveCloud(payload, isRetry) {
  const C = window.Cloud;
  if (!C || !C.ready || !C.user) return false;
  try { await C.saveDoc(payload); return true; }
  catch(e) {
    console.warn('Arete: cloud save failed, keeping localStorage as source of truth', e);
    if (!isRetry) _queueCloudRetry(payload);
    return false;
  }
}

// NEW: saveState is now async. It still writes localStorage synchronously
// before yielding, so every existing (non-awaiting) call site is unaffected.
let _mrGuard = false; // NEW: reentrancy guard for checkMissedRuns()
async function saveState() {
  // NEW: run the missed-run protocol on every save so persisted state is
  // always consistent with the adaptation rules (guarded against recursion).
  if (!_mrGuard && typeof checkMissedRuns === 'function') {
    _mrGuard = true;
    try { checkMissedRuns(); } catch(e) { console.warn('Arete: missed-run check failed', e); }
    finally { _mrGuard = false; }
  }
  const payload = _serializeState();
  _saveLocal(payload);
  return _saveCloud(payload);
}

// NEW: apply a persisted payload (from either localStorage or Firestore) onto
// AppState. Extracted verbatim from the old loadState so both paths share it.
function _applyLoadedState(saved) {
  if (!saved) return false;
  try {
    const _def=AppState.profile;
    AppState.profile=Object.assign({},_def,saved.profile??{});
    // Always preserve embedded identity fields
    if(!AppState.profile.name)   AppState.profile.name=_def.name;
    if(!AppState.profile.dob)    AppState.profile.dob=_def.dob;
    if(!AppState.profile.gender) AppState.profile.gender=_def.gender;
    // NEW: merge goals over defaults so state saved before this feature existed
    // (or missing individual keys) keeps working with the original values.
    AppState.profile.goals = Object.assign({}, GOAL_DEFAULTS, (saved.profile&&saved.profile.goals)||{});
    AppState.activities = saved.activities ?? [];
    AppState.plan       = saved.plan       ?? [];
    AppState.calPlan    = saved.calPlan    || [];
    AppState.adaptFlags = saved.adaptFlags || {};
    AppState.adaptLog   = saved.adaptLog   || []; // NEW
    AppState.pfDoc      = saved.pfDoc      ?? {title:'',body:''};
    AppState.pfFinance  = saved.pfFinance  ?? null;
    AppState.journal    = saved.journal    ?? [];
    AppState.savedWorkouts = saved.savedWorkouts ?? [];
    AppState.tasks      = saved.tasks      ?? { lists:[{id:'general',name:'General',items:[]}], activeList:0, sort:'manual' };
    AppState.ui.theme     = saved.ui?.theme     ?? AppState.ui.theme;
    AppState.ui.onboarded = true; // onboarding permanently bypassed
    AppState.ui.homeMode  = saved.ui?.homeMode  ?? 'running';
    AppState.ui.logMode   = saved.ui?.logMode   ?? 'running';
    // Recompute derived fields after load
    AppState.activities.forEach(a => {
      if (a.type==='run') a.avg_pace_sec_per_km = a.distance_km ? a.duration_sec/a.distance_km : 0;
    });
    // Recompute load_score for activities missing it (e.g. loaded from old localStorage)
    AppState.activities.forEach(a => {
      if (a.load_score == null) a.load_score = computeSessionLoad(a);
    });
    checkAndAdapt();
    return true;
  } catch(e) { console.warn('Arete: could not load state', e); return false; }
}

// NEW: loadState — same synchronous signature and call sites as before, now
// just the localStorage arm of the persistence layer.
function loadState() {
  if (!_store) return false;
  try {
    const raw = _store.getItem(_SK);
    if (!raw) return false;
    return _applyLoadedState(JSON.parse(raw));
  } catch(e) { console.warn('Arete: could not load state', e); return false; }
}

// NEW: cloud-preferring load. Called by the onAuthStateChanged listener.
// Prefers the Firestore doc; falls back to localStorage when offline, signed
// out, or when the remote doc does not exist yet (first sign-in on this
// account → we push the local state up instead of wiping it).
async function loadStateRemote() {
  const C = window.Cloud;
  if (!C || !C.ready || !C.user) return loadState();
  try {
    const remote = await C.loadDoc();
    if (remote && remote._updatedAt) {
      _applyLoadedState(remote);
      _saveLocal(remote);                 // keep the offline mirror fresh
      return true;
    }
    // No remote doc yet — seed it from whatever we have locally.
    loadState();
    await _saveCloud(_serializeState());
    return true;
  } catch(e) {
    console.warn('Arete: cloud load failed, falling back to localStorage', e);
    return loadState();
  }
}

/* ═══════════════════════════════════════════════════
   CALCULATIONS
═══════════════════════════════════════════════════ */
function calcKcal(a) {
  const p = AppState.profile;
  const wt = p.weight_kg || 70;
  const age = p.age || 30;
  const gender = p.gender || 'M';
  if (a.type === 'strength') {
    const SMETS = {'Leg Strength':5.0,'Upper Body':4.0,'Core':3.5,'Full Body':5.5,'Mobility':2.5,'Plyometrics':7.0};
    return Math.round((SMETS[a.session_type] || 4.0) * wt * ((a.duration_min||0) / 60));
  }
  const dur_min = (a.duration_sec || 0) / 60;
  const EPOC = {Recovery:0.05,Easy:0.06,'Long Run':0.07,Tempo:0.08,Interval:0.14,Race:0.14};
  const ef = EPOC[a.run_type] || 0.06;
  // PATH 1: Keytel et al. 2005 — HR-based. Valid ~55-85% HRmax.
  // Clamp HR to age-predicted max; cap output at VO2max physiological ceiling.
  if (a.avg_hr && p.rhr) {
    const maxHR = 220 - age;
    const hr = Math.min(a.avg_hr, maxHR);
    const kpm = gender === 'F'
      ? (-20.4022 + 0.4472*hr - 0.1263*wt + 0.074*age) / 4.184
      : (-55.0969 + 0.6309*hr + 0.1988*wt + 0.2017*age) / 4.184;
    const vo2max = gender === 'F' ? Math.max(35, 50 - 0.55*(age-20)) : Math.max(40, 60 - 0.55*(age-20));
    const kpmCeil = vo2max * wt * 5 / 1000;
    return Math.round(Math.min(Math.max(kpm, 0), kpmCeil) * dur_min * (1 + ef));
  }
  // PATH 2: ACSM VO2 running formula — pace + grade.
  if (a.distance_km && a.duration_sec) {
    const speed = (a.distance_km * 1000) / Math.max(dur_min, 0.01);
    const grade = (a.elevation_m || 0) > 0 ? a.elevation_m / (a.distance_km * 1000) : 0;
    const VO2 = speed * 0.2 + speed * grade * 0.9 + 3.5;
    return Math.round((VO2 * wt / 1000) * dur_min * 5 * (1 + ef));
  }
  // PATH 3: MET fallback — duration only. Apply EPOC multiplier for consistency.
  return Math.round((MET_MAP[a.run_type] || 8) * wt * (dur_min / 60) * (1 + ef));
}

function avgWeekKm(n) {
  let tot=0;
  for(let w=0;w<n;w++){
    // UTC-safe: step back (w+1) weeks, find Monday in UTC
    const _aMs=TODAY.getTime()-(w+1)*7*86400000;
    const _aDay=new Date(_aMs).getUTCDay(),_aDfm=_aDay===0?6:_aDay-1;
    const _awsMs=_aMs-_aDfm*86400000;

    const _aweIso=new Date(_awsMs+7*86400000).toISOString().split('T')[0];

/* ═══════════════════════════════════════════════════
   TRAINING PLAN GENERATOR
═══════════════════════════════════════════════════ */
function getPhase(wLeft) {
  // NEW: after a multi-session disruption the missed-run protocol may flatten
  // the plan by holding the athlete in Base/Build for longer. phaseShiftWeeks
  // is bounded 0..4 by applyDisruptionProtocol(); Taper is never encroached on
  // (its 6-week boundary is fixed) because race-week freshness is non-negotiable.
  const shift = Math.max(0, Math.min((AppState.adaptFlags && AppState.adaptFlags.phaseShiftWeeks) || 0, 4));
  if (wLeft>20-shift) return 'Base';
  if (wLeft>=12-shift) return 'Build';
  if (wLeft>=6) return 'Peak';
  return 'Taper';
}

// Session Load (TRIMP-Banister or sRPE-Foster)
function computeSessionLoad(a) {
  // ─── CALISTHENICS ─────────────────────────────────────────────────────────
  if (a.type === 'calisthenics') {
    return (a.rpe || 5) * 0.5 * (a.duration_min || 30);
  }

  const p   = AppState.profile;
  const dur = a.type === 'strength'
    ? (a.duration_min || 0)
    : (a.duration_sec || 0) / 60;

  // ─── PRIORITY 1: TRIMP-Banister when HR data is present ───────────────────
  // Normalized ×2.1 so a 60-min easy run at 65 % HRR ≈ 180 AU (Morton 1990)
  if (a.avg_hr && p.rhr && p.age && a.type !== 'strength') {
    const maxHR = 220 - p.age;
    const hrr   = Math.min(Math.max((a.avg_hr - p.rhr) / Math.max(maxHR - p.rhr, 1), 0), 1);
    const k     = p.gender === 'F' ? 0.86 * Math.exp(1.67 * hrr) : 0.64 * Math.exp(1.92 * hrr);
    return dur * hrr * k * 2.1;
  }

  // ─── PRIORITY 2: Objective pace-based model (no HR required) ──────────────
  // load = distance_km × IF^1.5 × 30
  // IF = threshold_pace_sec / actual_pace_sec  (>1 = harder than threshold)
  //
  // Calibration: at threshold pace (IF = 1), a 10 km tempo gives 300 AU,
  // matching RPE 6 × 50 min on the Foster sRPE scale. Tracks TRIMP×2.1 within
  // ±18 % across Z1–Z5 using only pace + distance. (Coggan rTSS concept,
  // di Prampero 2005 running economy; exponent 1.5 fitted to Jaime's profile.)
  if (a.type !== 'strength') {
    // Threshold pace = Z4 midpoint; fall back to fitness-level defaults (sec/km)
    const pz  = AppState.paceZones || computePaceZones();
    const thr = pz
      ? (pz.Z4_threshold.lo + pz.Z4_threshold.hi) / 2
      : ({ Beginner: 380, Intermediate: 335, Advanced: 275 }[p.fitness_level || 'Intermediate'] || 335);

    // 2a — explicit pace + distance (best objective case)
    if (a.avg_pace_sec_per_km && a.distance_km) {
      const IF = thr / a.avg_pace_sec_per_km;
      return a.distance_km * Math.pow(IF, 1.5) * 30;
    }

    // 2b — distance + duration only (derive pace)
    if (a.distance_km && dur > 0) {
      const derivedPace = (dur * 60) / a.distance_km;
      const IF = thr / derivedPace;
      return a.distance_km * Math.pow(IF, 1.5) * 30;
    }

    // 2c — duration only: estimate distance via run-type zone pace
    if (dur > 0) {
      const ZONE_PACE_EST = {
        'Easy': thr * 1.28, 'Recovery': thr * 1.45, 'Long Run': thr * 1.28,
        'Tempo': thr, 'Race Pace': thr * 1.06, 'Race': thr, 'Interval': thr * 0.87
      };
      const zonePace  = ZONE_PACE_EST[a.run_type] || (thr * 1.20);
      const estimatedKm = (dur * 60) / zonePace;
      const IF          = thr / zonePace;
      return estimatedKm * Math.pow(IF, 1.5) * 30;
    }
  }

  // ─── PRIORITY 3: RPE fallback (strength sessions or no objective data) ────
  // Type-aware defaults prevent flat RPE 5 from overcounting easy sessions.
  const defaultRpe = (a.run_type === 'Easy' || a.run_type === 'Long Run' || a.run_type === 'Recovery') ? 3
    : (a.run_type === 'Tempo' || a.run_type === 'Race Pace') ? 6
    : a.run_type === 'Interval' ? 7
    : a.session_type ? 5
    : 4;
  return (a.rpe || defaultRpe) * dur;
}

// ACWR
function computeACWR() {
  // EWMA-based ACWR: τ=7 (acute) and τ=28 (chronic) matching Banister impulse-response model.
  // Eliminates boundary artefacts of rolling-sum approach.
  const ADECAY = Math.exp(-1 / 7);
  const CDECAY = Math.exp(-1 / 28);
  let acute = 0, chronic = 0;
  // FIX (was a 56-day window): 56 days is only 2 time-constants for τ=28, which
  // leaves the chronic EWMA converged to just 1-e^-2 = 86.5 % of its true value.
  // Because ACWR = acute/chronic and the acute term (8 time-constants) IS fully
  // converged, the ratio was systematically inflated by 1/0.8647 = +15.6 %:
  // a perfectly steady athlete read 1.16 instead of 1.00, and a genuine "High
  // Load" week (true ratio 1.34) read 1.50 and tripped the "Overload — reduce
  // volume now" alarm. That biased every ACWR consumer: adaptPlan()'s >1.3 gate,
  // getPlanHealth(), the missed-run fold gate, and getSafeWeeklyLoadCeiling().
  // 180 days = 6.4 time-constants for τ=28 (0.17 % residual error) and matches
  // the window computePMC() already uses.
  const WINDOW_DAYS = 180;
  // Pre-bucket loads by date: the window tripled, so avoid an O(window × N) scan.
  const _loadByDate = Object.create(null);
  AppState.activities.forEach(a => {
    if (a.type !== 'run') return;                     // runs only — mirrors computePMC()
    _loadByDate[a.date] = (_loadByDate[a.date] || 0) + (a.load_score != null ? a.load_score : computeSessionLoad(a));
  });
  for (let i = WINDOW_DAYS - 1; i >= 0; i--) {
    const d = new Date(TODAY);
    d.setDate(d.getDate() - i);
    const ds = iso(d);
    const dayLoad = _loadByDate[ds] || 0;
    acute   = acute   * ADECAY + dayLoad * (1 - ADECAY);
    chronic = chronic * CDECAY + dayLoad * (1 - CDECAY);
  }
  const ratio = chronic > 0 ? acute / chronic : 1.0;
  let zone, label, color;
  if      (ratio < 0.8)  { zone='undertrain'; label='Undertraining ⬇️'; color='var(--text-2)';  }
  else if (ratio <= 1.3) { zone='optimal';    label='On Track';       color='var(--success)'; }
  else if (ratio <= 1.5) { zone='caution';    label='High Load';      color='var(--warning)'; }
  else                   { zone='danger';     label='Overload';        color='var(--error)';   }
  return { ratio, zone, label, color, acute, chronic };
}

// Monotony & Strain
function computeMonotony() {
  const wd = getWeekDates();
  const daily = wd.map(d => AppState.activities.filter(a=>a.date===d).reduce((s,a)=>s+(a.load_score||computeSessionLoad(a)),0));
  const mean = daily.reduce((s,v)=>s+v,0) / 7;
  const std  = Math.sqrt(daily.reduce((s,v)=>s+Math.pow(v-mean,2),0) / 7);
  const monotony = std > 0 ? mean / std : 0;
  const strain   = daily.reduce((s,v)=>s+v,0) * monotony;
  return { monotony, strain, flagged: monotony > 2.0 };
}

function generateCalPlan(runPlan){
  const items=[];
  const byDow={};
  runPlan.forEach(p=>{ const d=new Date(p.date+'T12:00:00'); byDow[d.getDay()]=p.date; });
  const base=runPlan[0]?.date||isoToday();
  function fallback(offset){ const d=new Date(base+'T12:00:00'); d.setDate(d.getDate()+offset); return d.toISOString().slice(0,10); }
  const assignments=[
    {dow:3, offset:2, wt:'Strength A'},
    {dow:5, offset:4, wt:'Strength B'},
    {dow:0, offset:6, wt:'Prehab'}
  ];
  assignments.forEach(({dow,offset,wt})=>{
    items.push({id:genId(),date:byDow[dow]||fallback(offset),type:'calisthenics',workout_type:wt,completed:false,missed:false});
  });
  return items;
}

function computeCalPMC(activities){
  const acts=activities.filter(a=>a.type==='calisthenics'&&a.workout_type!=='Prehab'&&a.load_score>0);
  if(!acts.length) return [];
  acts.sort((a,b)=>a.date.localeCompare(b.date));
  const start=new Date(acts[0].date+'T12:00:00');
  const end=new Date(); end.setHours(12,0,0,0);
  const scoreByDate={};
  acts.forEach(a=>{ scoreByDate[a.date]=(scoreByDate[a.date]||0)+a.load_score; });
  const result=[]; let atl=0,ctl=0;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const iso=d.toISOString().slice(0,10);
    const s=scoreByDate[iso]||0;
    atl=atl+(s-atl)*(1-Math.exp(-1/7));
    ctl=ctl+(s-ctl)*(1-Math.exp(-1/42));
    const acwr=ctl>0?atl/ctl:0;
    result.push({date:iso,atl:+atl.toFixed(1),ctl:+ctl.toFixed(1),tsb:+(ctl-atl).toFixed(1),acwr:+acwr.toFixed(2)});
  }
  return result;
}

function checkAndAdapt(){

  [...AppState.plan,...AppState.calPlan].forEach(item=>{

  const missedRuns=AppState.plan.filter(p=>p.missed&&p.workout_type!=='Rest').length;
  const missedStr =AppState.calPlan.filter(p=>p.missed&&p.workout_type!=='Prehab').length;
  if(!AppState.adaptFlags) AppState.adaptFlags={};
  if(missedRuns>=2) AppState.adaptFlags.reduceRunVol=true;
  if(missedStr>=2)  AppState.adaptFlags.skipStrB=true;
  saveState();
}

// === REPLACE: adaptPlan ===
function adaptPlan() {
  // Step 1: ACWR gate
  const { ratio } = computeACWR();
  if (ratio > 1.3) {
    const todayStr = iso(TODAY);
    for (let i=0; i<AppState.plan.length; i++) {
      const p = AppState.plan[i];
      if (p.date >= todayStr && (p.workout_type==='Interval'||p.workout_type==='Tempo'||p.workout_type==='Long Run')) {
        const pz = AppState.paceZones;
        const pr = pz ? formatPaceRange(pz.Z2_easy) : '';
        AppState.plan[i] = {...p, workout_type:'Easy',
          target_pace_zone:'Z2 Easy', target_pace_range:pr,
          instructions:`${p.target_distance_km||6} km easy${pr?' ('+pr+')':''}. [Auto-adjusted: ACWR ${ratio.toFixed(2)} \u2014 load spike detected]`,
          rationale:'ACWR above 1.3 \u2014 reducing intensity to prevent overtraining injury.'
        };
        break;
      }
    }
  }

  // Step 2: Recompute pace zones if latest activity is Tempo/Race
  const latestT = [...AppState.activities]
    .filter(a=>a.type==='run'&&(a.run_type==='Tempo'||a.run_type==='Race')&&a.avg_pace_sec_per_km)
    .sort((a,b)=>b.date.localeCompare(a.date))[0];
  if (latestT) {
    computePaceZones();
    const pz = AppState.paceZones;
    const todayStr = iso(TODAY);
    // Update future unexecuted plan entries with refreshed pace ranges
    AppState.plan.forEach(p => {
      if (p.date < todayStr || p.workout_type==='Rest' || p.workout_type==='Strength') return;
      const zMap = {
        'Z1 Recovery':  pz?.Z1_recovery,
        'Z2 Easy':      pz?.Z2_easy,
        'Z3 Marathon':  pz?.Z3_marathon,
        'Z4 Threshold': pz?.Z4_threshold,
        'Z5 Interval':  pz?.Z5_interval
      };
      const z = zMap[p.target_pace_zone];
      if (z) {
        p.target_pace_range = formatPaceRange(z);
        // Re-inject pace range into instructions if it contains a pace marker
        p.instructions = p.instructions.replace(
          /\(\d+:\d+[\u2013-]\d+:\d+ \/km\)/g,
          '('+p.target_pace_range+')'
        );
      }
    });
  }

  // Step 3: Recompute CTL target; rescale next 2 weeks if load changed > 10%
  const prevTarget = AppState.weeklyLoadTarget || 0;
  computeCTLTarget();
  const newTarget = AppState.weeklyLoadTarget || 0;
  if (prevTarget > 0 && Math.abs(newTarget - prevTarget) / prevTarget > 0.10) {
    const scale  = newTarget / prevTarget;
    const now    = iso(TODAY);
    const cutoff = iso(new Date(TODAY.getTime()+14*86400000));
    AppState.plan.forEach(p => {
      if (p.date >= now && p.date <= cutoff && p.target_distance_km > 0) {
        p.target_distance_km = Math.max(Math.round(p.target_distance_km * scale * 2) / 2, 3);
      }
    });
  }

  // Step 4: HR zone mismatch flag on all recent activities
  computeHRZones();
  AppState.activities.slice(-10).forEach(a => {
    if (a.type==='run') checkHRZoneMismatch(a);
  });

  // Step 5: Plan health
  getPlanHealth();
}


// Plan Health
function getPlanHealth() {
  const { ratio } = computeACWR();
  const pz = AppState.paceZones;
  // Use athlete's own Z4 threshold as pace reference; fallback chain to Z3 marathon, then 330 s/km.
  const targetPace = pz?.Z4threshold?.lo || pz?.Z3marathon?.lo || 330;

  const allRuns = [...AppState.activities.filter(a => a.type === 'run')]
    .sort((a, b) => b.date.localeCompare(a.date));
  // Prefer quality runs (Tempo/Race/Interval) for pace comparison — higher signal quality.
  // Easy run pace vs marathon-pace target is not a meaningful comparison.
  const qualityRuns = allRuns.filter(r =>
    r.run_type === 'Tempo' || r.run_type === 'Race' || r.run_type === 'Interval'
  ).slice(0, 3);
  const compRuns = qualityRuns.length >= 2 ? qualityRuns : allRuns.slice(0, 5);

  let paceStatus = 'on_track';
  if (compRuns.length && pz) {
    const actualPace = compRuns.reduce((s, a) => s + a.avg_pace_sec_per_km, 0) / compRuns.length;
    const delta = (actualPace - targetPace) / Math.max(targetPace, 1);
    if (delta > 0.25) paceStatus = 'adjust';   // >25% slower than threshold = undertrained
    else if (delta > 0.12) paceStatus = 'behind';
  }

  if (ratio > 1.5 || paceStatus === 'adjust')
    return { status:'adjust',   label:'Needs Adjustment 🔁', color:'var(--error)'   };
  if (ratio > 1.3 || paceStatus === 'behind')
    return { status:'behind',   label:'Slightly Behind',  color:'var(--warning)' };
  if (ratio < 0.8)
    return { status:'behind',   label:'Building Base 📈',     color:'var(--text-2)'  };
  return       { status:'on_track', label:'On Track',       color:'var(--success)' };
}

// === INSERT: computePMC / formatPaceRange / formatHRRange / computePaceZones / computeHRZones / computeCTLTarget ===


/* ═══════════════════════════════════════════════════════════════════════════
   NEW: ADAPTIVE MISSED-RUN PROTOCOL  (goal race: AppState.profile.goal.goal_date)
   ───────────────────────────────────────────────────────────────────────────
   Weeks-to-race is always recomputed from today's date — nothing is hardcoded.

   WHAT COUNTS AS A MISSED RUN
     A scheduled run session (Short Run / Long Run / Tempo / Interval / Easy /
     Recovery / Race) whose date is strictly in the past and for which there is
     no matching logged activity of type 'run' on that date, and which is not
     marked completed in either plan store. Rest days, strength/calisthenics
     days and future sessions can never be "missed".

     Two schedule sources are scanned and merged by date:
       1. window.APP.SCHEDULE — the fixed 31-week plan the Plan page renders
          (SR + LR + RACE sessions). This is the only source that holds
          *past* dates, because…
       2. AppState.plan — regenerated from today forward by generatePlan(), so
          it normally holds no past dates. Scanned anyway (defensively) for any
          stale past-dated entries, which are also flagged .missed = true to
          stay consistent with the pre-existing checkAndAdapt() behaviour.

   THE PROTOCOL (rules chosen to be evidence-consistent and, critically, to
   reuse the safety ceilings already present in computeCTLTarget/adaptPlan —
   ACWR ≤ 1.30 and week-over-week load ≤ 1.15× — rather than inventing new
   unbounded ones)

     1. ISOLATED SINGLE MISSED SESSION (one miss, bracketed by completed
        sessions). One session is inside normal training noise; the aerobic
        stimulus is worth partially recovering but not worth a spike. The
        missed distance is folded into the next MR.FOLD_SESSIONS upcoming
        non-Rest runs, each bump capped at MR.MAX_SESSION_BUMP (20 %) of that
        session's own target, and the whole fold additionally clipped so the
        resulting week never exceeds the existing 1.15× WoW / 1.30× ACWR
        ceilings. If ACWR is already > 1.30 the fold is skipped entirely —
        the athlete is already carrying more load than the plan intends.

     2. MISSED LONG RUN — rescheduled, not folded. Long runs carry the most
        marathon-specific adaptation (glycogen depletion, fat oxidation,
        connective-tissue and pacing-discipline work) and cannot be
        meaningfully recreated by adding 2 km to three midweek runs. So we
        first try to move it onto an available Rest day inside the same
        Mon–Sun week (Friday, then Sunday — the days generatePlan leaves as
        Rest/Recovery). Only if no rest day is free does it fold into next
        week's long run, and then only via the same proportional +12 % step
        generatePlan already uses, still clipped by the ceilings above.

     3. MULTIPLE CONSECUTIVE MISSED SESSIONS (>= MR.DISRUPTION_RUN consecutive
        scheduled runs missed, or >= MR.DISRUPTION_WINDOW_MISSES misses inside
        the trailing 14 days) — the signature of illness, injury or life
        disruption. We explicitly do NOT cram the lost volume. Instead:
          • generatePlan() is re-run. It rebuilds from today using the athlete's
            *actual* 4-week average (avgWeekKm(4)), which has by definition
            fallen, so the whole remaining block re-scales itself downward.
          • adaptFlags.phaseShiftWeeks extends the Base/Build phases (bounded
            0..4 weeks via getPhase) so the athlete rebuilds aerobic base
            instead of jumping into unsupported intensity.
          • computeCTLTarget() recomputes the realistic weekly load target with
            the same ceilings. Weekly volume is never raised to "catch up".

     4. TARGET REACHABILITY. projectReachableCTL() forward-simulates CTL from
        today to race day under the maximum *safe* progression (1.15× WoW,
        1.30× ACWR, with the plan's own taper). If the reachable peak falls
        below MR.UNREACHABLE_RATIO (95 %) of the plan's design target, we do
        not silently lower the bar: a toast fires, a dismissible banner appears
        on the Plan page, and adaptFlags.realisticCtlTarget records the honest
        number alongside the original.

   Every action appends to AppState.adaptLog (date, reason, change, detail),
   capped at 50 entries and inspectable from the Plan page banner.
═══════════════════════════════════════════════════════════════════════════ */

// NEW: tunable constants for the missed-run protocol.
const MR = Object.freeze({
  FOLD_SESSIONS:            3,     // upcoming sessions an isolated miss is spread over
  MAX_SESSION_BUMP:         0.20,  // per-session cap: +20 % of its own target
  ACWR_CEILING:             1.30,  // same ceiling adaptPlan/computeCTLTarget already use
  WOW_CEILING:              1.15,  // same week-over-week ceiling computeCTLTarget uses
  LR_STEP:                  0.12,  // same proportional LR step generatePlan uses
  DISRUPTION_RUN:           2,     // >= 2 consecutive missed runs = disruption
  DISRUPTION_WINDOW_DAYS:   14,
  DISRUPTION_WINDOW_MISSES: 3,
  MAX_PHASE_SHIFT_WEEKS:    4,
  UNREACHABLE_RATIO:        0.95,
  LOG_CAP:                  50
});

// NEW: is this AppState.plan entry a run session (i.e. missable)?
function _isRunPlanSession(p) {
  return !!p && p.workout_type && p.workout_type !== 'Rest' && p.workout_type !== 'Strength'
    && (p.target_distance_km || 0) > 0;
}

// NEW: did the athlete actually run on this date?
function _hasLoggedRun(ds) {
  if (AppState.activities.some(a => a.type === 'run' && a.date === ds)) return true;
  const lg = window.APP && window.APP.getLog ? window.APP.getLog(ds) : null;
  return !!(lg && lg.completed);
}

// NEW: scan both schedule sources for past-dated, uncompleted run sessions.
// Returns [{date, kind:'LR'|'SR', km, source}] sorted oldest-first.
function detectMissedRuns() {
  const today = isoToday();
  const byDate = new Map();

  // Source 1 — the fixed 31-week schedule rendered on the Plan page.
  const sched = (window.APP && window.APP.SCHEDULE) || [];
  sched.forEach(wk => (wk.sessions || []).forEach(sn => {
    if (!sn || !sn.date || sn.date >= today) return;
    if (sn.sessionType !== 'SR' && sn.sessionType !== 'LR' && sn.sessionType !== 'RACE') return;
    if (_hasLoggedRun(sn.date)) return;
    byDate.set(sn.date, {date:sn.date, kind:(sn.sessionType==='LR'?'LR':'SR'), km:sn.km||0, source:'APP.SCHEDULE'});
  }));

  // Source 2 — AppState.plan (defensive: normally holds no past dates).
  AppState.plan.forEach(p => {
    if (!p.date || p.date >= today || p.completed) return;
    if (!_isRunPlanSession(p)) return;
    if (_hasLoggedRun(p.date)) { p.missed = false; return; }
    p.missed = true; // consistent with the existing checkAndAdapt() convention
    if (!byDate.has(p.date)) {
      byDate.set(p.date, {date:p.date, kind:(p.workout_type==='Long Run'?'LR':'SR'),
                          km:p.target_distance_km||0, source:'AppState.plan'});
    }
  });

  return [...byDate.values()].sort((a,b)=>a.date.localeCompare(b.date));
}

// NEW: append to the inspectable adaptation history.
function logAdaptation(reason, change, detail) {
  if (!Array.isArray(AppState.adaptLog)) AppState.adaptLog = [];
  const entry = {id:'ad'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
                 date:isoToday(), ts:Date.now(), reason, change, detail:detail||''};
  AppState.adaptLog.unshift(entry);
  if (AppState.adaptLog.length > MR.LOG_CAP) AppState.adaptLog.length = MR.LOG_CAP;
  return entry;
}

// NEW: the shared safety ceiling for any load added by this protocol.
// Deliberately identical in spirit to computeCTLTarget's maxSafeWeekly /
// maxIncreaseWeekly so we never invent a looser bound.
function getSafeWeeklyLoadCeiling() {
  const {chronic, ratio} = computeACWR();
  const maxSafeWeekly = chronic > 0 ? chronic * 7 * MR.ACWR_CEILING : Infinity;
  const d7ago = iso(new Date(TODAY.getTime()-7*86400000));
  const prevWeekLoad = AppState.activities
    .filter(a => a.date > d7ago && a.date <= iso(TODAY) && a.type === 'run')
    .reduce((s,a) => s + (a.load_score || computeSessionLoad(a)), 0);
  const maxIncreaseWeekly = prevWeekLoad > 0 ? prevWeekLoad * MR.WOW_CEILING : Infinity;
  return { ceiling: Math.min(maxSafeWeekly, maxIncreaseWeekly), acwr: ratio, prevWeekLoad };
}

// NEW: the plan's own week-1 daily load, in AU/day.
// Used as the restart floor below. Week 1 of the athlete's own 31-week plan is
// by construction a safe entry point, so a fully detrained athlete may resume
// there rather than at 1.15x of nothing. Uses the same Z2 pace model
// (IF^1.5 x 30, Z2 = 1.24x threshold) as computeSessionLoad/computeExpectedPeakCTL.
function _planWeek1DailyLoad() {
  const sched = (window.APP && window.APP.SCHEDULE) || [];
  const w1 = sched[0];
  if (!w1) return 0;
  const km = (w1.lr && w1.lr.km || 0) + (w1.sr && w1.sr.km || 0);
  if (km <= 0) return 0;
  const auPerKm = Math.pow(1/1.24, 1.5) * 30;   // Z2 easy intensity factor
  return (km * auPerKm) / 7;
}

// NEW: how much fitness can still be built safely before race day?
// Forward-simulates the PMC from today to race day under the *existing* safety
// ceilings, plus the plan's own 3-week taper, and returns the peak CTL reached.
// Used only to tell the athlete the truth about the target — never to relax a rule.
//
// Two modelling notes that matter:
//   • The ACWR ceiling is applied to the simulated acute:chronic RATIO, not to
//     "daily load vs CTL". Comparing an instantaneous daily load against a
//     lagging EWMA is only valid at steady state; during a ramp from zero the
//     EWMA sits far below actual load, so a naive cap pins growth at zero
//     forever. This is the same boundary artefact computeACWR() avoids by using
//     EWMAs on both sides.
//   • The projection is capped at the plan's own design target. Reaching for
//     more than the plan asks for is not a meaningful "reachable" figure.
function projectReachableCTL() {
  const AD = Math.exp(-1/7), CD = Math.exp(-1/28), CTL_D = Math.exp(-1/42);
  const pmc = computePMC();
  let ctl = pmc.ctl_today;
  const {acute:acute0, chronic:chronic0} = computeACWR();
  let acute = acute0, chronicSim = chronic0;

  const floor  = _planWeek1DailyLoad();                 // safe re-entry load
  const design = computeExpectedPeakCTL();              // what the plan asks for
  let daily = Math.max(chronic0, floor);
  if (!(daily > 0)) daily = Math.max(ctl, 1);

  const gd = new Date(AppState.profile.goal.goal_date+'T00:00:00');
  const daysToRace = Math.max(Math.round((gd - TODAY)/86400000), 0);
  const TAPER_DAYS = 21, TAPER_F = 0.55;

  let peak = ctl;
  for (let d = 0; d < daysToRace; d++) {
    if (d > 0 && d % 7 === 0) {
      // Weekly progression: take the standard <=1.15x step, but only if the
      // simulated ACWR is still inside the 1.30 ceiling. Never below the
      // re-entry floor, never above what the plan itself targets.
      const ratio = chronicSim > 0 ? acute / chronicSim : 1.0;
      if (ratio <= MR.ACWR_CEILING) daily = daily * MR.WOW_CEILING;
      daily = Math.max(daily, floor);
      if (design > 0) daily = Math.min(daily, design);
    }
    const load = (daysToRace - d) <= TAPER_DAYS ? daily * TAPER_F : daily;
    acute      = acute      * AD    + load * (1 - AD);
    chronicSim = chronicSim * CD    + load * (1 - CD);
    ctl        = ctl        * CTL_D + load * (1 - CTL_D);
    if (ctl > peak) peak = ctl;
  }
  return Math.round(peak);
}

// NEW: Rule 2 — try to reschedule a missed Long Run within its own week.
// Returns a description string if it moved it, else null.
function rescheduleMissedLongRun(miss) {
  const today = isoToday();
  const wkDates = getWeekDates(new Date(miss.date+'T12:00:00'));
  // Candidate slots = days still in the future, inside the missed run's own
  // Mon–Sun week, that carry no meaningful training stimulus.
  //
  // Both Rest AND Recovery days qualify. This matters: generatePlan schedules
  // the long run on Saturday, so a missed long run is only *detectable* once
  // Saturday has passed — by which point Friday's Rest day is gone too and
  // Sunday is the only slot left. Sunday is a 5 km Z1 recovery jog, and
  // displacing it for the long run is exactly the right trade (Rule 2: long
  // runs carry the most marathon-specific adaptation). Restricting candidates
  // to 'Rest' alone would make this whole branch unreachable in practice.
  // Preference order: Rest before Recovery, then earliest date.
  const candidates = AppState.plan
    .filter(p => wkDates.includes(p.date) && p.date >= today && !p.completed
                 && (p.workout_type === 'Rest' || p.workout_type === 'Recovery'))
    .sort((a,b) => {
      const rank = p => (p.workout_type === 'Rest' ? 0 : 1);
      return rank(a) - rank(b) || a.date.localeCompare(b.date);
    });
  if (!candidates.length) return null;

  const slot = candidates[0];
  const pz = AppState.paceZones || computePaceZones();
  const prRange = pz ? formatPaceRange(pz.Z2_easy) : '';
  const km = Math.max(Math.round(miss.km || 0), 8);
  Object.assign(slot, {
    workout_type:'Long Run', target_distance_km:km,
    target_pace_zone:'Z2 Easy', target_pace_range:prRange,
    instructions:`${km} km long run at comfortable easy effort${prRange?' ('+prRange+')':''}. Fuel every 45 min. [Rescheduled from ${fmtDateSh(miss.date)} — long runs are prioritised over midweek volume.]`,
    rationale:'Long runs carry the most marathon-specific adaptation, so a missed one is rescheduled rather than absorbed.',
    rescheduled_from: miss.date, missed:false, completed:false
  });
  return `Long run moved from ${fmtDateSh(miss.date)} to ${fmtDateSh(slot.date)} (${km} km)`;
}

// NEW: Rule 2 fallback — fold a missed LR into next week's LR via the existing
// proportional +12 % step, never beyond the phase cap generatePlan applied.
function foldMissedLongRunForward(miss) {
  const today = isoToday();
  const nextLR = AppState.plan
    .filter(p => p.date > today && p.workout_type === 'Long Run')
    .sort((a,b) => a.date.localeCompare(b.date))[0];
  if (!nextLR) return null;
  const before = nextLR.target_distance_km;
  const step = Math.min(Math.max(Math.round(before * MR.LR_STEP), 1), 4); // same guard as generatePlan
  const after = before + step;
  nextLR.target_distance_km = after;
  nextLR.instructions = nextLR.instructions.replace(/^\d+(\.\d+)?\s*km/, after+' km')
    + ` [+${step} km: partial carry-over of the ${fmtDateSh(miss.date)} long run, capped at the standard ${Math.round(MR.LR_STEP*100)} % weekly step.]`;
  return `Next long run ${fmtDateSh(nextLR.date)}: ${before} → ${after} km (+${step})`;
}

// NEW: Rule 1 — spread an isolated missed session's stimulus forward, capped.
function foldMissedSessionForward(miss) {
  const {ceiling, acwr} = getSafeWeeklyLoadCeiling();
  if (acwr > MR.ACWR_CEILING) {
    return {applied:false, note:`No load added — ACWR ${acwr.toFixed(2)} already above the ${MR.ACWR_CEILING} ceiling.`};
  }
  const today = isoToday();
  const targets = AppState.plan
    .filter(p => p.date > today && _isRunPlanSession(p) && p.workout_type !== 'Long Run')
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0, MR.FOLD_SESSIONS);
  if (!targets.length) return {applied:false, note:'No upcoming sessions available to fold into.'};

  let budget = miss.km || 0;
  if (budget <= 0) return {applied:false, note:'Missed session had no distance target.'};

  // Clip the total fold so the next 7 days stay under the shared ceiling.
  const nextWkEnd = iso(new Date(TODAY.getTime()+7*86400000));
  const plannedNextWkLoad = AppState.plan
    .filter(p => p.date > today && p.date <= nextWkEnd && _isRunPlanSession(p))
    .reduce((s,p) => s + computeSessionLoad({type:'run', run_type:p.workout_type,
              distance_km:p.target_distance_km, duration_sec:0}), 0);
  if (isFinite(ceiling) && plannedNextWkLoad >= ceiling) {
    return {applied:false, note:`No load added — next week is already at the safe load ceiling (${Math.round(ceiling)} AU).`};
  }

  const parts = [];
  targets.forEach(p => {
    if (budget <= 0.1) return;
    const cap = p.target_distance_km * MR.MAX_SESSION_BUMP;   // per-session cap
    const add = Math.round(Math.min(cap, budget / targets.length) * 2) / 2;
    if (add < 0.5) return;
    const before = p.target_distance_km;
    p.target_distance_km = Math.round((before + add) * 2) / 2;
    budget -= add;
    p.instructions = p.instructions.replace(/^\d+(\.\d+)?\s*km/, p.target_distance_km+' km')
      + ` [+${add} km folded in from the missed ${fmtDateSh(miss.date)} session — capped at ${Math.round(MR.MAX_SESSION_BUMP*100)} % of this session.]`;
    parts.push(`${fmtDateSh(p.date)} ${before}→${p.target_distance_km} km`);
  });
  if (!parts.length) return {applied:false, note:'Fold would have exceeded the per-session cap; plan left unchanged.'};
  return {applied:true, note:parts.join(', ')};
}

// NEW: Rule 3 — multi-session disruption. Rebuild, flatten, never cram.
function applyDisruptionProtocol(missed, longestRun) {
  const prevShift = Math.max(0, (AppState.adaptFlags.phaseShiftWeeks) || 0);
  // One extra Base/Build week per full week of disruption (~4 run sessions/wk),
  // hard-bounded so the Peak/Taper block is never squeezed out.
  const add = Math.max(1, Math.round(longestRun / 2));
  AppState.adaptFlags.phaseShiftWeeks = Math.min(prevShift + add, MR.MAX_PHASE_SHIFT_WEEKS);
  AppState.adaptFlags.disruption = {at:isoToday(), missed:missed.length, consecutive:longestRun};

  generatePlan();       // rebuilds from today off the (now lower) 4-week average
  computeCTLTarget();   // recomputes the realistic weekly load under the ceilings

  return `${missed.length} missed sessions (${longestRun} consecutive) — remaining weeks regenerated; Base/Build extended by ${AppState.adaptFlags.phaseShiftWeeks} week(s). Weekly volume was not increased to catch up.`;
}

// NEW: group missed sessions into consecutive runs (a gap = an intervening
// scheduled session that WAS completed).
function _groupConsecutive(missed) {
  const sched = (window.APP && window.APP.SCHEDULE) || [];
  const allRunDates = sched.flatMap(wk => (wk.sessions||[])
      .filter(sn => sn && (sn.sessionType==='SR'||sn.sessionType==='LR'||sn.sessionType==='RACE'))
      .map(sn => sn.date)).sort();
  const idx = new Map(allRunDates.map((d,i)=>[d,i]));
  const groups = [];
  let cur = [];
  missed.forEach(m => {
    if (!cur.length) { cur = [m]; return; }
    const prev = cur[cur.length-1];
    const a = idx.get(prev.date), b = idx.get(m.date);
    if (a != null && b != null && b === a+1) cur.push(m);
    else { groups.push(cur); cur = [m]; }
  });
  if (cur.length) groups.push(cur);
  return groups;
}

// NEW: main entry point. Called on app load and before every saveState().
// Cheap when nothing changed: adaptation only runs when the missed-set
// signature changes or the day rolls over.
function checkMissedRuns(force) {
  if (!AppState.profile.goal.goal_date) return {missed:[], applied:false};
  if (!(window.APP && window.APP.SCHEDULE)) return {missed:[], applied:false}; // modules not loaded yet

  const missed = detectMissedRuns();
  const sig = missed.map(m => m.date).join(',');
  const F = AppState.adaptFlags || (AppState.adaptFlags = {});
  if (!force && F._mrSig === sig && F._mrDay === isoToday()) return {missed, applied:false};
  F._mrSig = sig; F._mrDay = isoToday();

  if (!missed.length) return {missed, applied:false};

  // Only act on sessions we have not already adapted for.
  const handled = new Set(F.handledMisses || []);
  const fresh = missed.filter(m => !handled.has(m.date));
  if (!fresh.length) return {missed, applied:false};

  const changes = [];
  const groups = _groupConsecutive(fresh);
  const longestRun = groups.reduce((mx,g) => Math.max(mx, g.length), 0);
  const winStart = iso(new Date(TODAY.getTime() - MR.DISRUPTION_WINDOW_DAYS*86400000));
  const recentMisses = missed.filter(m => m.date >= winStart).length;
  const isDisruption = longestRun >= MR.DISRUPTION_RUN || recentMisses >= MR.DISRUPTION_WINDOW_MISSES;

  if (isDisruption) {
    // ── Rule 3 ───────────────────────────────────────────────────────────
    const detail = applyDisruptionProtocol(fresh, longestRun);
    changes.push(logAdaptation('Multiple missed sessions (illness / injury / life disruption)',
      'Remaining weeks regenerated, Base/Build flattened and extended', detail));
  } else {
    fresh.forEach(m => {
      if (m.kind === 'LR') {
        // ── Rule 2 ───────────────────────────────────────────────────────
        const moved = rescheduleMissedLongRun(m);
        if (moved) changes.push(logAdaptation('Missed long run', 'Rescheduled within the same week', moved));
        else {
          const folded = foldMissedLongRunForward(m);
          if (folded) changes.push(logAdaptation('Missed long run (no rest day free to reschedule into)',
            'Partial carry-over into the next long run', folded));
        }
      } else {
        // ── Rule 1 ───────────────────────────────────────────────────────
        const r = foldMissedSessionForward(m);
        changes.push(logAdaptation('Isolated missed session',
          r.applied ? 'Stimulus folded into upcoming sessions (capped)' : 'No change — safety ceilings hit',
          r.note));
      }
    });
    computeCTLTarget(); // keep the weekly load target honest after any fold
  }

  F.handledMisses = [...handled, ...fresh.map(m => m.date)].slice(-200);

  // ── Rule 4: is the original target still reachable safely? ─────────────
  const designTarget = computeExpectedPeakCTL();
  const reachable = projectReachableCTL();
  if (designTarget > 0 && reachable < designTarget * MR.UNREACHABLE_RATIO) {
    F.realisticCtlTarget = reachable;
    F.originalCtlTarget  = designTarget;
    const gd = new Date(AppState.profile.goal.goal_date+'T00:00:00');
    const wksLeft = Math.max(Math.ceil((gd-TODAY)/(7*86400000)), 0);
    changes.push(logAdaptation('Original CTL target no longer safely reachable',
      `Realistic peak CTL revised ${designTarget} → ${reachable} AU/day`,
      `With ${wksLeft} week(s) left, the fastest safe progression (\u22641.15\u00d7 week-over-week, ACWR \u22641.30) reaches ${reachable} AU/day by ${fmtDateSh(AppState.profile.goal.goal_date)} — ${Math.round((1-reachable/designTarget)*100)} % below the plan's original ${designTarget}. Standards were not silently lowered: this is the honest number.`));
    if (typeof showToast === 'function') showToast('Plan adjusted — target revised');
  } else {
    F.realisticCtlTarget = null;
    F.originalCtlTarget  = null;
    if (changes.length && typeof showToast === 'function') showToast('Plan adjusted for missed run');
  }

  if (changes.length) F.lastAdaptationId = AppState.adaptLog[0] && AppState.adaptLog[0].id;
  return {missed, applied:changes.length > 0, changes};
}

// PMC: CTL/ATL/TSB from 6 months back
function computePMC() {
  const CTL_DECAY = Math.exp(-1/42);
  const ATL_DECAY = Math.exp(-1/7);
  let ctl=0, atl=0;
  for(let i=180; i>=0; i--){
    const d=new Date(TODAY); d.setDate(d.getDate()-i);
    const ds=iso(d);
    const dayLoad=AppState.activities.filter(a=>a.date===ds && a.type==='run')
      .reduce((s,a)=>s+(a.load_score||computeSessionLoad(a)),0);
    ctl=ctl*CTL_DECAY+dayLoad*(1-CTL_DECAY);
    atl=atl*ATL_DECAY+dayLoad*(1-ATL_DECAY);
  }
  return { ctl_today:ctl, atl_today:atl, tsb_today:ctl-atl };
}


// Simulate expected peak CTL from APP.SCHEDULE using zone-based sRPE estimates.
// Returns the maximum CTL the plan is designed to build (used as the fitness target).
// Calibrated to sRPE-Foster scale: load = RPE × duration_min (Foster 1996).
function computeExpectedPeakCTL() {
  // NEW: honour an explicit user override from Profile → Customize Goals.
  const _override = getGoal('peakCtlTarget');
  if (_override > 0) return _override;
  // Simulate CTL over APP.SCHEDULE using the same dist × IF^1.5 × 30 model
  // as computeSessionLoad priority 2. Both functions MUST stay in sync so
  // the readiness bar hits 100 % exactly at peak training week 27.
  const sched = (window.APP && window.APP.SCHEDULE) || [];
  if (!sched.length) return CTL_TARGETS[AppState.profile.fitness_level || 'Intermediate'] || 168;

  // Threshold pace: Z4 midpoint if available, else fitness-level defaults (sec/km)
  const pz  = AppState.paceZones;
  const THR = pz
    ? (pz.Z4_threshold.lo + pz.Z4_threshold.hi) / 2
    : ({ Beginner: 380, Intermediate: 335, Advanced: 275 }[AppState.profile.fitness_level || 'Intermediate'] || 335);

  // Expected zone paces from threshold (sec/km)
  const ZONE_PACE = { Z1: THR*1.40, Z2: THR*1.24, Z3: THR*1.00, Z4: THR, Z5: THR*0.90 };
  const STR_LOAD  = 6 * 0.5 * 45;          // calisthenics load unchanged
  const DAY_IDX   = { PP:1, SR:2, LR:5 };

  function sessLoad(s) {
    // PP (Pull & Push, Tuesday) combines both former sessions, so it carries 2× the load of one.
    if (s.sessionType === 'PP') return STR_LOAD*2;
    if (!s.km) return 0;
    const paceSec = ZONE_PACE[s.zone || 'Z2'] || (THR * 1.24);
    const IF      = THR / paceSec;
    if (s.type === 'Shakeout') return s.km * Math.pow(THR / (THR * 1.40), 1.5) * 30;
    return s.km * Math.pow(IF, 1.5) * 30;
  }

  const CTL_D = Math.exp(-1 / 42);
  let ctl = 0, peak = 0;
  sched.forEach(wk => {
    const dl = new Array(7).fill(0);
    (wk.sessions || []).filter(s => s && s.sessionType !== 'RACE').forEach(s => {
      const di = DAY_IDX[s.sessionType];
      if (di != null) dl[di] += sessLoad(s);
    });
    dl.forEach(d => { ctl = ctl * CTL_D + d * (1 - CTL_D); if (ctl > peak) peak = ctl; });
  });
  return Math.round(Math.max(peak, 50));
}

// Pace range display: "5:20–6:10 /km"
function formatPaceRange(zone) {
  if (!zone) return '';
  const loStr = fmtPace(zone.lo);
  if (!isFinite(zone.hi)) return loStr + '+ /km';
  return loStr + '\u2013' + fmtPace(zone.hi) + ' /km';
}

// HR range display: "138–155 bpm"
function formatHRRange(zone) {
  if (!zone) return null;
  return Math.round(zone.lo) + '\u2013' + Math.round(zone.hi) + ' bpm';
}

// === REPLACE: computePaceZones ===
// Jack Daniels VDOT-derived pace zones anchored to most recent Tempo/Race
function computePaceZones() {
  const anchor = [...AppState.activities]
    .filter(a => a.type==='run' && (a.run_type==='Tempo'||a.run_type==='Race') && a.avg_pace_sec_per_km)
    .sort((a,b) => b.date.localeCompare(a.date))[0];

  const FL_DEFAULTS = { Beginner:420, Intermediate:330, Advanced:270 };
  const tp = anchor
    ? anchor.avg_pace_sec_per_km
    : FL_DEFAULTS[AppState.profile.fitness_level||'Intermediate'] || 330;

  const pz = {
    Z1_recovery: { lo: tp*1.35, hi: Infinity },
    Z2_easy:     { lo: tp*1.20, hi: tp*1.35 },
    Z3_marathon: { lo: tp*1.08, hi: tp*1.15 },
    Z4_threshold:{ lo: tp*0.98, hi: tp*1.05 },
    Z5_interval: { lo: tp*0.90, hi: tp*0.97 },
    anchor_date: anchor ? anchor.date : null,
    anchor_pace: tp
  };
  AppState.paceZones = pz;
  return pz;
}

// === REPLACE: computeHRZones ===
// Karvonen formula with Tanaka max HR
function computeHRZones() {
  const p = AppState.profile;
  if (!p.age || !p.rhr) { AppState.hrZones = null; return null; }
  const maxHR = 211 - 0.64 * p.age;
  const hrr   = maxHR - p.rhr;
  const z = (lo, hi) => ({ lo: p.rhr + hrr*lo, hi: p.rhr + hrr*hi });
  const hz = {
    Z1: z(0.50, 0.60), Z2: z(0.60, 0.70),
    Z3: z(0.70, 0.80), Z4: z(0.80, 0.90),
    Z5: { lo: p.rhr + hrr*0.90, hi: maxHR },
    max_hr: maxHR, hrr
  };
  AppState.hrZones = hz;
  return hz;
}

// HR zone mismatch checker — called from adaptPlan after each activity save
function checkHRZoneMismatch(activity) {
  if (!activity.avg_hr || !AppState.hrZones) { activity.hr_flag=null; return; }
  const hz = AppState.hrZones;
  const hr = activity.avg_hr;
  const zoneOf = hr => {
    if (hr <= hz.Z1.hi) return 1;
    if (hr <= hz.Z2.hi) return 2;
    if (hr <= hz.Z3.hi) return 3;
    if (hr <= hz.Z4.hi) return 4;
    return 5;
  };
  const EXP = { Recovery:1, Easy:2, 'Long Run':2, Tempo:4, Interval:5, Race:4 };
  const actual   = zoneOf(hr);
  const expected = EXP[activity.run_type] || 3;
  if (actual > expected + 1)      activity.hr_flag = 'Ran harder than intended (HR zone drift)';
  else if (actual < expected - 1) activity.hr_flag = 'Ran easier than target pace zone';
  else                            activity.hr_flag = null;
}

// === REPLACE: computeCTLTarget ===
function computeCTLTarget() {
  if (!AppState.profile.goal.goal_date) return;
  const ctlTarget  = computeExpectedPeakCTL(); // plan-derived peak CTL target
  const ctlCurrent = computePMC().ctl_today;

  const gd = new Date(AppState.profile.goal.goal_date+'T00:00:00');
  const weeksToRace = Math.ceil((gd-TODAY)/(7*86400000));
  const weeksToPeak = Math.max(weeksToRace - 3, 1);

  const targetWeeklyLoad   = ctlTarget * 7;                 // AU/week
  // FIX: computeACWR().chronic is an EWMA of DAILY loads (AU/day), not a weekly
  // total — the old comment ("avg weekly load over 28d") mis-stated its own
  // variable and the old code did `chronic * 1.3`, producing an AU/day figure
  // that was then min()'d against two AU/week figures (targetWeeklyLoad and
  // maxIncreaseWeekly). The daily-unit term is ~7x smaller so it always won,
  // pinning weeklyLoadTarget to roughly 1/7 of its intended value and making
  // adaptPlan()'s Step-3 rescale factor jump discontinuously whenever the
  // binding constraint switched between a daily-unit and a weekly-unit term.
  // Multiply by 7 so all three terms are AU/week.
  const {chronic}          = computeACWR(); // AU/day (EWMA, τ=28)
  const maxSafeWeekly      = chronic * 7 * 1.3;             // AU/week

  const d7ago = iso(new Date(TODAY.getTime()-7*86400000));
  const prevWeekLoad = AppState.activities
    .filter(a=>a.date>d7ago&&a.date<=iso(TODAY))
    .reduce((s,a)=>s+(a.load_score||computeSessionLoad(a)),0);
  const maxIncreaseWeekly = prevWeekLoad > 0 ? prevWeekLoad * 1.15 : Infinity;

  let planned = Math.min(targetWeeklyLoad, maxSafeWeekly > 0 ? maxSafeWeekly : targetWeeklyLoad);
  if (isFinite(maxIncreaseWeekly) && maxIncreaseWeekly > 0)
    planned = Math.min(planned, maxIncreaseWeekly);

  AppState.weeklyLoadTarget = planned;
  return { ctlTarget, ctlCurrent, planned, weeksToPeak };
}

function applyTheme() {
  const dk = AppState.ui.theme==='dark';
  document.documentElement.setAttribute('data-theme', AppState.ui.theme);
  const lbl = dk?'Light mode':'Dark mode';
  const sbBtn=$('#sb-theme'); if(sbBtn){ sbBtn.innerHTML=`<i data-lucide="${dk?'sun':'moon'}" style="width:16px;height:16px"></i><span>${lbl}</span>`; }
  $('#sb-theme-lbl') && ($('#sb-theme-lbl').textContent=lbl);
  // update profile appearance row if visible
  const trl=$('#theme-row-lbl'); if(trl) trl.textContent=dk?'Dark':'Light';
  lucide.createIcons();
}

function toggleTheme() {
  AppState.ui.theme = AppState.ui.theme==='light'?'dark':'light';
  applyTheme();
  saveState();
}
