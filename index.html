      <div class="man-card-hdr" onclick="manToggle('${id}')">
        <div class="man-card-icon" style="background:${bg}">${icon}</div>
        <div class="man-card-label">
          <div class="man-card-name">${name}</div>
          <div class="man-card-tag">${tag}</div>
        </div>
        <svg class="man-card-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="man-body">${body}</div>
    </div>`;
  }

  const ICO={
    run:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><circle cx="12" cy="5" r="2"/><path d="M7 18l2.5-5 2.5 2 2-4 3 7"/><path d="M7.5 11l1-3 3 1 1-2.5"/></svg>`,
    chart:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
    target:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
    zone:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
    plan:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    body:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>`,
    book:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
    kpi:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><rect x="2" y="2" width="9" height="9" rx="2"/><rect x="13" y="2" width="9" height="9" rx="2"/><rect x="2" y="13" width="9" height="9" rx="2"/><rect x="13" y="13" width="9" height="9" rx="2"/></svg>`,
  };

  const AC='color-mix(in oklab,var(--accent) 14%,transparent)';
  const BC='color-mix(in oklab,var(--blue) 14%,transparent)';
  const RC='color-mix(in oklab,var(--notification) 14%,transparent)';
  const GC='color-mix(in oklab,var(--success) 14%,transparent)';
  const OC='color-mix(in oklab,var(--orange) 14%,transparent)';
  const PC='color-mix(in oklab,var(--purple) 14%,transparent)';

  // ── Section helpers
  function sec(anchor,label,cards){
    return `<div class="man-sec" id="mansec-${anchor}">
      <div class="man-sec-hdr">${label}</div>
      ${cards}
    </div>`;
  }
  function toc(items){
    return `<div class="man-toc">${items.map(([a,l])=>`<a class="man-toc-pill" href="#mansec-${a}" onclick="document.getElementById('mansec-${a}').scrollIntoView({behavior:'smooth',block:'start'});return false">${l}</a>`).join('')}</div>`;
  }

  // ═══════════════════════════════════════════════
  //  CARD BODIES
  // ═══════════════════════════════════════════════

  const b_load = `
    <p>Every logged activity is converted into a single number called <strong>Training Load</strong> (measured in Arbitrary Units, AU). It captures how much physiological stress the session placed on your body, accounting for both duration and intensity.</p>
    <p>The app uses three methods in priority order:</p>
    <div class="man-formula">
      <strong>Priority 1 — TRIMP-Banister (HR data available)</strong><br>
      Load = Duration × HRR × k × 2.1<br>
      k = 0.64 × e<sup>1.92×HRR</sup> (male) or 0.86 × e<sup>1.67×HRR</sup> (female)<br>
      HRR = (Avg HR − Resting HR) / (Max HR − Resting HR)<br><br>
      <strong>Priority 2 — Pace-based (distance + pace logged)</strong><br>
      Load = Distance (km) × IF<sup>1.5</sup> × 30<br>
      IF = Threshold pace (sec/km) / Actual pace (sec/km)<br><br>
      <strong>Priority 3 — RPE fallback (duration only)</strong><br>
      Load = RPE × Duration (min)
    </div>
    <div class="man-note">A 60-min easy run ≈ 120–160 AU. A 60-min tempo ≈ 300 AU. A full marathon race ≈ 600–900 AU.</div>
    <p>For <strong>calisthenics</strong>: Load = RPE × 0.5 × Duration (min). The 0.5 factor accounts for the lower cardiovascular stress compared to running.</p>
  `;

  const b_ctl = `
    <p><strong>CTL</strong> is your rolling 42-day fitness. It is an exponentially weighted moving average (EWMA) of daily training load, with a time constant τ = 42 days (half-life ≈ 29 days). Think of it as your aerobic engine: the higher it is, the more training your body can handle.</p>
    <div class="man-formula">
      <strong>CTL(today) = CTL(yesterday) × e<sup>−1/42</sup> + Load(today) × (1 − e<sup>−1/42</sup>)</strong><br>
      Decay per rest day: −2.35 %<br>
      Half-life: 29.1 days
    </div>
    <table class="man-table">
      <tr><th>Level</th><th>CTL target at peak</th><th>Meaning</th></tr>
      <tr><td>Beginner</td><td>110 AU/day</td><td>First marathon training</td></tr>
      <tr><td>Intermediate</td><td>155 AU/day</td><td>Sub-4 h marathon range</td></tr>
      <tr><td>Advanced</td><td>200 AU/day</td><td>Sub-3 h marathon range</td></tr>
    </table>
    <div class="man-note">CTL only drops 2.35 %/day at rest. Two rest days costs ≈ 4.6 AU if you are at 100 — barely noticeable. Consistent training over weeks is what builds it.</div>
  `;

  const b_atl = `
    <p><strong>ATL</strong> is your rolling 7-day fatigue. It uses the same EWMA formula as CTL but with τ = 7 days (half-life ≈ 4.9 days). It rises quickly after a hard block and drops quickly with rest — it represents how tired your body is <em>right now</em>.</p>
    <div class="man-formula">
      <strong>ATL(today) = ATL(yesterday) × e<sup>−1/7</sup> + Load(today) × (1 − e<sup>−1/7</sup>)</strong><br>
      Decay per rest day: −13.3 %<br>
      Half-life: 4.9 days
    </div>
    <div class="man-note">Because ATL decays 6× faster than CTL, every rest day improves your freshness (TSB). ATL is the lever you pull with taper — drop it fast while CTL holds.</div>
  `;

  const b_tsb = `
    <p><strong>TSB</strong> = CTL − ATL. It is your "form": positive means you are fresher than your fitness level implies (good for racing), negative means you are carrying fatigue. During a training block you are almost always in negative TSB — that is normal and necessary.</p>
    <div class="man-formula">
      <strong>TSB = CTL − ATL</strong>
    </div>
    <table class="man-table">
      <tr><th>TSB range</th><th>Label</th><th>Meaning</th></tr>
      <tr><td>> +50</td><td>Race Ready 🏁</td><td>Peak taper — race today</td></tr>
      <tr><td>+5 to +50</td><td>Fresh 💚</td><td>Well recovered, ready for a quality session</td></tr>
      <tr><td>−30 to +5</td><td>Normal 🟡</td><td>Training load — slight fatigue, no concern</td></tr>
      <tr><td>−50 to −30</td><td>Fatigued 🟠</td><td>Accumulated fatigue — monitor recovery</td></tr>
      <tr><td>≤ −50</td><td>Very Fatigued 🔴</td><td>Overreaching — rest or reduce load immediately</td></tr>
    </table>
    <div class="man-note">During the taper phase (weeks 28–31 of the plan) the app shows "Taper 🌙" regardless of TSB, because the structural load reduction intentionally drives TSB upward — it is correct behaviour, not undertraining.</div>
  `;

  const b_acwr = `
    <p>The <strong>Acute:Chronic Workload Ratio</strong> measures how much load you have done in the past week relative to your long-term average. It is the single best leading indicator of soft-tissue injury risk (Gabbett 2016, Hulin et al. 2014).</p>
    <div class="man-formula">
      ACWR = Acute EWMA (τ=7) / Chronic EWMA (τ=28)<br>
      Computed over a 56-day window (≥8 time-constants for stability)
    </div>
    <table class="man-table">
      <tr><th>ACWR</th><th>Zone</th><th>Action</th></tr>
      <tr><td>< 0.8</td><td>Undertraining ⬇️</td><td>Volume too low — increase gradually</td></tr>
      <tr><td>0.8 – 1.3</td><td>On Track ✅</td><td>Sweet spot — sustain</td></tr>
      <tr><td>1.3 – 1.5</td><td>High Load ⚠️</td><td>Injury risk rising — add recovery</td></tr>
      <tr><td>> 1.5</td><td>Overload 🔴</td><td>Significant risk — reduce volume now</td></tr>
    </table>
    <div class="man-note">ACWR uses EWMA (not rolling sums) to eliminate boundary artefacts at the start of a training week — the method matches Banister's original impulse-response model.</div>
  `;

  const b_rdpct = `
    <p>The <strong>Marathon Readiness %</strong> is a single number that tells you how prepared you are for your goal race, from 0 % (no training) to 100 % (plan completed at peak CTL). It is computed from your CTL relative to the target CTL your plan is designed to hit at peak week.</p>
    <div class="man-formula">
      Readiness % = (CTL_today / CTL_target) × 100 + TSB bonus<br><br>
      TSB bonus = min(TSB / CTL_target × 25, 15) — only when TSB > 0<br>
      (Mujika &amp; Padilla 2003 taper benefit, max +15 pp)
    </div>
    <p>The TSB bonus prevents the readiness bar from falling during taper even though you are running less — which is correct, because your freshness is increasing your race-day performance potential.</p>
    <div class="man-note">CTL_target is dynamically computed by simulating your full schedule and finding the highest CTL the plan is designed to reach. It adapts if you change your race type or fitness level.</div>
  `;

  const b_zones = `
    <p>Pace zones define the intensity of every run. They are anchored to your <strong>threshold pace</strong> — the pace you can sustain for roughly 60 minutes at maximum effort (roughly your 10K race pace for intermediate runners).</p>
    <p>The app derives your threshold from your most recent Tempo or Race activity. If none is logged yet, it uses fitness-level defaults (Beginner: 7:00/km, Intermediate: 5:30/km, Advanced: 4:30/km).</p>
    <table class="man-table">
      <tr><th>Zone</th><th>Name</th><th>Pace vs threshold</th><th>Feel</th></tr>
      <tr><td>Z1</td><td>Recovery</td><td>> 135 %</td><td>Conversational, very easy</td></tr>
      <tr><td>Z2</td><td>Easy / Aerobic</td><td>120 – 135 %</td><td>Comfortable, could talk in sentences</td></tr>
      <tr><td>Z3</td><td>Marathon Pace</td><td>108 – 115 %</td><td>Comfortably hard — race-day effort</td></tr>
      <tr><td>Z4</td><td>Threshold / Tempo</td><td>98 – 105 %</td><td>Hard, 20–40 min max sustained</td></tr>
      <tr><td>Z5</td><td>Interval</td><td>90 – 97 %</td><td>Very hard, short rep bursts</td></tr>
    </table>
    <div class="man-note">Percentages are of threshold pace in sec/km — a higher % means a slower pace. Z2 at 120 % of a 5:30 threshold = 6:36/km pace. All plan sessions use these zones for targets.</div>
  `;

  const b_plan = `
    <p>The 31-week plan is automatically generated from your goal race date and fitness level. It is structured in four progressive phases, each targeting a different physiological adaptation.</p>
    <table class="man-table">
      <tr><th>Phase</th><th>Weeks</th><th>Focus</th></tr>
      <tr><td>🔵 Base</td><td>1 – 12</td><td>Aerobic foundation. Easy Z2 running, building weekly volume from your current base to ~80 % of peak. Long runs grow to 22–28 km.</td></tr>
      <tr><td>🟠 Build</td><td>13 – 20</td><td>Race-specific fitness. Marathon-pace (Z3) sessions introduced. Long runs reach 32–38 km. Highest ACWR weeks.</td></tr>
      <tr><td>🔴 Peak</td><td>21 – 27</td><td>Peak volume and CTL. Highest weekly km. Tune-up races possible. This is where CTL reaches its maximum.</td></tr>
      <tr><td>🟢 Taper</td><td>28 – 31</td><td>Fatigue dissipation. Volume drops ~50 %, intensity maintained. ATL falls, TSB rises to race-ready territory.</td></tr>
    </table>
    <p>Plan sessions each week:</p>
    <table class="man-table">
      <tr><th>Code</th><th>Session</th><th>Day</th></tr>
      <tr><td>SR</td><td>Short Run (Z2/Z3)</td><td>Tuesday / Thursday</td></tr>
      <tr><td>LR</td><td>Long Run (Z2)</td><td>Sunday</td></tr>
      <tr><td>PP</td><td>Pull & Push calisthenics</td><td>Tuesday</td></tr>
    </table>
  `;

  const b_runtypes = `
    <p>When logging a run, selecting the correct type matters — the app uses run type to estimate load when pace data is unavailable, and to colour-code plan sessions.</p>
    <table class="man-table">
      <tr><th>Type</th><th>Zone</th><th>Typical use</th></tr>
      <tr><td>Easy</td><td>Z2</td><td>Most of your weekly volume (80 %+ of runs)</td></tr>
      <tr><td>Long Run</td><td>Z2</td><td>Weekly long run, slower than easy</td></tr>
      <tr><td>Recovery</td><td>Z1</td><td>Day after a hard session or race</td></tr>
      <tr><td>Tempo</td><td>Z4</td><td>Sustained threshold effort, 20–40 min</td></tr>
      <tr><td>Race Pace</td><td>Z3</td><td>Marathon-pace sections in long runs</td></tr>
      <tr><td>Interval</td><td>Z5</td><td>Short hard reps, e.g. 400 m × 8</td></tr>
      <tr><td>Race</td><td>Z4–Z5</td><td>Actual race — sets your threshold anchor</td></tr>
    </table>
  `;

  const b_kpis = `
    <p>The running home screen shows the following KPIs at the top:</p>
    <table class="man-table">
      <tr><th>KPI</th><th>How computed</th></tr>
      <tr><td>Monthly km</td><td>Sum of all runs in the past 30 calendar days</td></tr>
      <tr><td>Longest run</td><td>Maximum single run distance in the past 30 days</td></tr>
      <tr><td>Steps</td><td>Logged step count if entered manually in the run log. Otherwise estimated using a Strava-style cadence model: <em>steps = cadence × duration (min)</em>, where cadence = 165 + (360 − pace) × 0.08, clamped to 150–190 spm. Faster pace → higher cadence → more steps/min.</td></tr>
      <tr><td>Calories</td><td>If HR logged: Keytel HR-based formula. Otherwise: ACSM metabolic equivalent formula (MET × weight × duration)</td></tr>
      <tr><td>Run streak</td><td>Consecutive plan-scheduled Short Run and Long Run sessions completed, counted backwards from today</td></tr>
    </table>
  `;

  const b_cali = `
    <p>The calisthenics tracker records <strong>Pull</strong>, <strong>Push</strong>, <strong>Leg Strength</strong>, <strong>Full Body</strong>, <strong>Mobility</strong>, and <strong>Prehab</strong> sessions. Load is calculated as:</p>
    <div class="man-formula">
      <strong>Calisthenics Load = RPE × 0.5 × Duration (min)</strong><br>
      The 0.5 factor normalises to the same AU scale as running load, accounting for lower cardiovascular stress
    </div>
    <p>The home screen shows pull-up and dip counts for the current week, plus a workout streak. The prehab checklist (shoulder, hip flexor, calf, glute activation) tracks injury-prevention habit completion.</p>
  `;

  const b_reading = `
    <p>The reading/writing tracker has three activity sub-types:</p>
    <table class="man-table">
      <tr><th>Type</th><th>Logged metric</th><th>Monthly goal</th></tr>
      <tr><td>Reading</td><td>Pages read + book title</td><td>100 pages/month</td></tr>
      <tr><td>Writing</td><td>Words written</td><td>1,000 words/month</td></tr>
      <tr><td>Editing</td><td>Duration (min)</td><td>No target</td></tr>
    </table>
    <p>The <strong>reading tracker table</strong> shows weekly periods (Mon–Sun) with pages read per book. Streaks are counted in consecutive months where the goal was met. The weekly donut chart shows the time split across the three types.</p>
  `;

  const b_pb = `
    <p>Personal Bests are tracked automatically for four standard distances. Every logged run is checked against your current PB for the matching distance:</p>
    <table class="man-table">
      <tr><th>Distance</th><th>Detection</th></tr>
      <tr><td>5 K</td><td>Any logged run of exactly 5 km (±5 %)</td></tr>
      <tr><td>10 K</td><td>Any logged run of exactly 10 km (±5 %)</td></tr>
      <tr><td>Half Marathon</td><td>Any logged run of 21.1 km (±5 %)</td></tr>
      <tr><td>Marathon</td><td>Any logged run of 42.2 km (±5 %)</td></tr>
    </table>
    <p>PBs are stored as ISO date + pace (sec/km). The display converts to min:sec/km format automatically.</p>
  `;

  // ═══════════════════════════════════════════════
  //  ASSEMBLE
  // ═══════════════════════════════════════════════
  return `
    <div class="man-header">
      <button class="man-back" onclick="closeManual()" aria-label="Close manual">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div>
        <div class="man-header-ttl">Running Manual</div>
        <div class="man-header-sub">Every metric and concept used in this app</div>
      </div>
    </div>
    ${toc([['load','Session Load'],['pmc','CTL / ATL / TSB'],['acwr','ACWR'],['rdpct','Readiness %'],['zones','Pace Zones'],['plan','Training Plan'],['kpis','Home KPIs'],['cali','Calisthenics'],['reading','Reading']])}
    ${sec('load','Training Load',
      card('load',ICO.chart,AC,'Session Load','AU — how hard was this session?',b_load)
    )}
    ${sec('pmc','Performance Management Chart',
      card('ctl',ICO.body,BC,'CTL — Chronic Training Load','Fitness · 42-day EWMA',b_ctl)+
      card('atl',ICO.body,RC,'ATL — Acute Training Load','Fatigue · 7-day EWMA',b_atl)+
      card('tsb',ICO.target,GC,'TSB — Training Stress Balance','Form = CTL − ATL',b_tsb)
    )}
    ${sec('acwr','Injury Risk',
      card('acwr',ICO.zone,OC,'ACWR — Acute:Chronic Workload Ratio','Week load vs rolling baseline',b_acwr)
    )}
    ${sec('rdpct','Marathon Readiness',
      card('rdpct',ICO.target,AC,'Readiness %','CTL progress toward plan peak',b_rdpct)+
      card('zones',ICO.run,GC,'Pace Zones — Z1 to Z5','Derived from your threshold pace',b_zones)
    )}
    ${sec('plan','Training Plan',
      card('plan',ICO.plan,BC,'Plan Phases','Base → Build → Peak → Taper',b_plan)+
      card('runtypes',ICO.run,AC,'Run Types','Easy, Long, Tempo, Interval…',b_runtypes)
    )}
    ${sec('kpis','Running Home KPIs',
      card('kpis',ICO.kpi,OC,'Home KPIs','Monthly km, Steps, Calories, Streak',b_kpis)+
      card('pb',ICO.target,RC,'Personal Bests','5 K, 10 K, Half, Full',b_pb)
    )}
    ${sec('cali','Calisthenics',
      card('cali',ICO.body,PC,'Calisthenics Load & Tracker','RPE × 0.5 × Duration',b_cali)
    )}
    ${sec('reading','Reading & Writing',
      card('reading',ICO.book,GC,'Reading / Writing Tracker','Pages, words, streaks',b_reading)
    )}
  `;
}


/* ══════════════════════════════════════════════════
   JOURNAL
══════════════════════════════════════════════════ */
function openJournal() {
  const ov = document.getElementById('journal-ov');
  if (!ov) return;
  ov.style.display = 'block';
  ov.scrollTop = 0;
  const s = document.getElementById('jnl-search');
  if (s) s.value = '';
  renderJournalList();
}

function closeJournal() {
  const ov = document.getElementById('journal-ov');
  if (ov) ov.style.display = 'none';
}

function renderJournalList() {
  const q = (document.getElementById('jnl-search')?.value || '').toLowerCase().trim();
  let entries = [...(AppState.journal || [])];
  if (q) entries = entries.filter(e =>
    (e.title || '').toLowerCase().includes(q) || (e.body || '').toLowerCase().includes(q)
  );
  entries.sort((a, b) => b.date.localeCompare(a.date));

  const countEl = document.getElementById('jnl-count');
  if (countEl) countEl.textContent = entries.length === 1 ? '1 entry' : entries.length + ' entries';

  const list = document.getElementById('jnl-list');
  if (!list) return;

  if (entries.length === 0) {
    const isSearch = q.length > 0;
    list.innerHTML = `<div class="jnl-empty">
      <div class="jnl-empty-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
      <div class="jnl-empty-msg">${isSearch ? 'No entries found' : 'No entries yet'}</div>
      <div class="jnl-empty-sub">${isSearch ? 'Try different search terms' : 'Start writing to capture your thoughts'}</div>
      ${!isSearch ? '<button class="jnl-empty-btn" onclick="openJournalCompose(null)">Write your first entry</button>' : ''}
    </div>`;
    return;
  }

  // Group by month — key "YYYY-MM" for sorting, label for display
  const groups = {};
  entries.forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    const label = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    if (!groups[key]) groups[key] = { label, entries: [] };
    groups[key].entries.push(e);
  });

  let out = '';
  Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(key => {
    const g = groups[key];
    out += `<div class="jnl-month-hdr">${g.label}</div>`;
    g.entries.forEach(e => {
      const rawTitle = e.title || (e.body ? e.body.slice(0, 42) + (e.body.length > 42 ? '\u2026' : '') : 'Entry');
      const dateStr = fmtDateSh(e.date);
      // Escape entry id for inline onclick (ids are alphanumeric from genId)
      out += `<div class="jnl-entry" onclick="openJournalCompose('${e.id}')">
        <div class="jnl-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="17" height="17"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        <div class="jnl-entry-body">
          <div class="jnl-entry-ttl">${rawTitle.replace(/</g,'&lt;')}</div>
          <div class="jnl-entry-meta">${dateStr}</div>
          ${e.body ? `<div class="jnl-entry-preview">${e.body.replace(/</g,'&lt;')}</div>` : ''}
        </div>
        <div class="jnl-entry-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>`;
    });
  });
  list.innerHTML = out;
}

function openJournalCompose(id) {
  const entry = id ? (AppState.journal || []).find(e => e.id === id) : null;
  const today = isoToday();
  const bodyVal  = entry ? entry.body.replace(/</g, '&lt;') : '';
  const titleVal = entry ? (entry.title || '').replace(/"/g, '&quot;') : '';

function saveJournalEntry(id) {
  const bodyEl = document.getElementById('jnl-body');
  const body = bodyEl ? bodyEl.value.trim() : '';
  if (!body) { showToast('Please write something first'); return; }

  const date  = document.getElementById('jnl-date')?.value  || isoToday();
  const title = document.getElementById('jnl-title')?.value?.trim() || '';
  if (!AppState.journal) AppState.journal = [];

  if (id) {
    const idx = AppState.journal.findIndex(e => e.id === id);
    if (idx > -1) AppState.journal[idx] = { ...AppState.journal[idx], date, title, body };
  } else {
    AppState.journal.push({ id: genId(), date, title, body });
  }

  saveState(); closeSheet(); renderJournalList();
  showToast(id ? 'Entry updated!' : 'Entry saved!');
}

function deleteJournalEntry(id) {
  AppState.journal = (AppState.journal || []).filter(e => e.id !== id);
  saveState(); closeSheet(); renderJournalList();
  showToast('Entry deleted');
}

function pfeLiveTotal(){
  const vals=[...document.querySelectorAll('.pfe-acc')].map(i=>parseFloat(i.value)||0);
  const total=vals.reduce((a,b)=>a+b,0);
  const el=document.getElementById('pfe-live-total');
  if(el)el.textContent=total>0?'€'+total.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}):'€ —';
}

function pfSaveEntry(){
  const period=$('#pfe-period').value;
  if(!period){showToast('Please select a month');return;}
  const entry={period};
  $$('.pfe-acc').forEach(inp=>{ entry[inp.dataset.k]=parseFloat(inp.value)||0; });
  const F=AppState.pfFinance;
  // Replace if same period exists, else insert sorted
  const idx=F.entries.findIndex(e=>e.period===period);
  if(idx>=0) F.entries[idx]=entry;
  else{
    F.entries.push(entry);
    F.entries.sort((a,b)=>a.period.localeCompare(b.period));
  }
  saveState();
  closeSheet();
  const el=$('#pg-personal');
  if(el) _pfRender(el);
}

function pfDeleteEntry(period){
  if(!confirm('Delete entry for '+period+'?'))return;
  AppState.pfFinance.entries=AppState.pfFinance.entries.filter(e=>e.period!==period);
  saveState();
  const el=$('#pg-personal');
  if(el) _pfRender(el);
}


function pfLock(){
  const el=$('#pg-personal');
  if(el) renderPersonal(el);
}

    const v=(raw===''||isNaN(parseFloat(raw)))?GOAL_DEFAULTS[d.key]:Math.max(d.min,parseFloat(raw));
    AppState.profile.goals[d.key]=v;
  });
}

function editPF(f){
  const p=AppState.profile;
  let inp;
  if(f==='gender') inp=`<select class="fi" id="ev"><option value="M"${p.gender==='M'?' selected':''}>Male</option><option value="F"${p.gender==='F'?' selected':''}>Female</option><option value="Other"${p.gender==='Other'?' selected':''}>Other</option></select>`;
  else if(f==='name') inp=`<input type="text" class="fi" id="ev" value="${p.name}">`;
  else inp=`<input type="number" class="fi" id="ev" value="${p[f]||''}">`;
  openSheet(`<div class="sh-ttl">Edit ${f.replace('_',' ')}</div><div class="fg">${inp}</div><button onclick="savePF('${f}')" class="btn btn-primary btn-full">Save</button>`);
}
function savePF(f){
  const v=$('#ev')?.value; if(!v&&v!=='0')return;
  if(['age','weight_kg','height_cm','rhr'].includes(f)) AppState.profile[f]=parseFloat(v)||0;
  else AppState.profile[f]=v;
  generatePlan(); saveState(); closeSheet(); navigate('#profile'); showToast('Updated!');
}
function editGF(f){
  const g=AppState.profile.goal;
  let inp;
  if(f==='race_type') inp=`<select class="fi" id="ev">${['Full Marathon','Half Marathon','10K','5K'].map(r=>`<option${g.race_type===r?' selected':''}>${r}</option>`).join('')}</select>`;
  else inp=`<input type="date" class="fi" id="ev" value="${g.goal_date}">`;
  openSheet(`<div class="sh-ttl">Edit ${f==='race_type'?'Race type':'Goal date'}</div><div class="fg">${inp}</div><button onclick="saveGF('${f}')" class="btn btn-primary btn-full">Save</button>`);
}
function saveGF(f){
  const v=$('#ev')?.value; if(!v)return;
  AppState.profile.goal[f]=v; generatePlan(); saveState(); closeSheet(); navigate('#profile'); showToast('Updated!');
}

function confirmReset(){
  if(confirm("This will permanently delete all your activities, profile, and training plan. This cannot be undone.")){
    if(_store) _store.removeItem(_SK);
    // NEW: also clear the Firestore copy so a reset is not undone on next login.
    try { if(window.Cloud && window.Cloud.ready && window.Cloud.user) window.Cloud.deleteDoc(); } catch(e){}
    location.reload();
  }
}

(function(){
  const ACC_KEYS=['revolut','santanderPT','santanderES','coverflex','cash'];
  const ACC_LABELS=['Revolut','Santander PT','Santander ES','Coverflex','Cash'];
  let tmChart=null;
  const tmValues={};

  // tmHistory is the single source of truth — always kept in sync with AppState.pfFinance.tmHistory
  function getHistory(){
    if(!AppState.pfFinance)AppState.pfFinance={};
    if(!Array.isArray(AppState.pfFinance.tmHistory))AppState.pfFinance.tmHistory=[];
    return AppState.pfFinance.tmHistory;
  }
  function persist(){
    if(AppState.pfFinance)AppState.pfFinance.tmHistory=getHistory();
    saveState();
  }

  function getLatestTotal(){
    const entries=(AppState.pfFinance&&AppState.pfFinance.entries)||[];
    if(!entries.length)return null;
    const sorted=[...entries].sort((a,b)=>a.period.localeCompare(b.period));
    const last=sorted[sorted.length-1];
    return ACC_KEYS.reduce((s,k)=>s+(parseFloat(last[k])||0),0);
  }

  function updateWidget(){
    const el=document.getElementById('tm-spent-val');
    if(!el)return;
    const h=getHistory();
    if(!h.length){el.textContent='—';return;}
    const spent=h[h.length-1].spent;
    const pos=spent>=0;
    el.textContent=(pos?'-':'+')+'€'+Math.abs(spent).toFixed(2);
    const cs=getComputedStyle(document.documentElement);
    el.style.color=pos?cs.getPropertyValue('--notification').trim():cs.getPropertyValue('--success').trim();
  }

  function updateWidgetPreview(spent){
    const el=document.getElementById('tm-spent-val');
    if(!el)return;
    const h=getHistory();
    if(spent===null){if(!h.length)el.textContent='—';return;}
    const pos=spent>=0;
    el.textContent=(pos?'-':'+')+'€'+Math.abs(spent).toFixed(2);
    const cs=getComputedStyle(document.documentElement);
    el.style.color=pos?cs.getPropertyValue('--notification').trim():cs.getPropertyValue('--success').trim();
  }

  function syncChart(){
    if(!tmChart)return;
    const h=getHistory();
    tmChart.data.labels=h.map(p=>p.label);
    tmChart.data.datasets[0].data=h.map(p=>p.spent);
    tmChart.update('active');
  }

  function renderHistoryList(){
    const list=document.getElementById('tm-history-list');
    if(!list)return;
    const h=getHistory();
    if(!h.length){
      list.innerHTML='<div style="font-size:12px;color:var(--text-3);padding:6px 2px;">No snapshots yet.</div>';
      return;
    }
    list.innerHTML=h.map((p,i)=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;gap:8px;">
        <span style="font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums;min-width:80px;">${p.label}</span>
        <span style="font-size:13px;font-weight:700;color:${p.spent>=0?'var(--notification)':'var(--success)'};font-variant-numeric:tabular-nums;">${p.spent>=0?'-':'+'}€${Math.abs(p.spent).toFixed(2)}</span>
        <button onclick="tmDeleteSnapshot(${i})" style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-3);cursor:pointer;border-radius:5px;padding:0;flex-shrink:0;transition:color 140ms,background 140ms;" onmouseover="this.style.color='var(--notification)';this.style.background='color-mix(in oklab,var(--notification) 10%,transparent)'" onmouseout="this.style.color='var(--text-3)';this.style.background='transparent'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`).join('');
  }

  window.tmDeleteSnapshot=function(i){
    getHistory().splice(i,1);
    persist();
    syncChart();
    updateWidget();
    renderHistoryList();
  };

  function recalcPreview(){
    const cur=ACC_KEYS.reduce((s,k,i)=>s+(parseFloat(document.getElementById('tm-acc-'+i)?.value)||0),0);
    const lat=getLatestTotal();
    updateWidgetPreview(lat!==null&&cur>0?lat-cur:null);
  }

  window.tmLogSnapshot=function(){
    const cur=ACC_KEYS.reduce((s,k,i)=>s+(parseFloat(document.getElementById('tm-acc-'+i)?.value)||0),0);
    if(cur===0)return;
    const lat=getLatestTotal();
    if(lat===null)return;
    const spent=+(lat-cur).toFixed(2);
    const now=new Date();
    const label=now.getDate()+'/'+(now.getMonth()+1)+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    getHistory().push({label,spent});
    persist();
    syncChart();
    updateWidget();
    renderHistoryList();
    const btn=document.getElementById('tm-log-btn');
    if(btn){
      const orig=btn.innerHTML;
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg> Logged!';
      btn.classList.remove('btn-secondary');btn.classList.add('btn-primary');
      setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('btn-primary');btn.classList.add('btn-secondary');},1400);
    }
  };

  function initChart(){
    const ctx=document.getElementById('tm-chart');
    if(!ctx||tmChart)return;
    const nc=getComputedStyle(document.documentElement).getPropertyValue('--notification').trim()||'#ef4444';
    tmChart=new Chart(ctx,{
      type:'line',
      data:{labels:[],datasets:[{label:'Spent',data:[],borderColor:nc,backgroundColor:'rgba(161,53,68,0.08)',borderWidth:2,pointRadius:5,pointHoverRadius:7,pointBackgroundColor:nc,tension:0.35,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'€'+c.parsed.y.toFixed(2)}}},
        scales:{
          x:{ticks:{color:'#999',font:{size:10}},grid:{color:'rgba(128,128,128,0.1)'}},
          y:{ticks:{color:'#999',font:{size:10},callback:v=>'€'+v},grid:{color:'rgba(128,128,128,0.1)'},beginAtZero:true}
        }
      }
    });
    if(getHistory().length)syncChart();
  }

  function buildThisMonth(){
    const container=document.getElementById('tm-inputs');
    if(!container)return;
    container.innerHTML='';
    ACC_LABELS.forEach((name,i)=>{
      const wrap=document.createElement('div');
      wrap.className='tm-field';
      wrap.innerHTML='<label>'+name+'</label><input id="tm-acc-'+i+'" type="number" step="0.01" placeholder="0.00">';
      container.appendChild(wrap);
      const inp=wrap.querySelector('input');
      if(tmValues[i])inp.value=tmValues[i];
      inp.addEventListener('input',()=>{tmValues[i]=inp.value;recalcPreview();});
    });
    let histWrap=document.getElementById('tm-history-wrap');
    if(!histWrap){
      const chartParent=document.getElementById('tm-chart')?.closest('div[style*="position:relative"]');
      if(chartParent){
        histWrap=document.createElement('div');
        histWrap.id='tm-history-wrap';
        histWrap.style.cssText='margin-top:8px;display:flex;flex-direction:column;gap:5px;';
        histWrap.innerHTML='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:2px;">Snapshots</div><div id="tm-history-list"></div>';
        chartParent.after(histWrap);
      }
    }
    tmChart=null;
    initChart();
    recalcPreview();
    renderHistoryList();
  }

  function attachObserver(){
    const pg=document.getElementById('pg-personal');
    if(!pg){setTimeout(attachObserver,300);return;}
    new MutationObserver(()=>{if(document.getElementById('tm-inputs'))buildThisMonth();})
      .observe(pg,{childList:true,subtree:false});
    if(document.getElementById('tm-inputs'))buildThisMonth();
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',attachObserver);
  else attachObserver();
})();

</script>

  {week:24,phase:'PEAK', lr:{km:32,zone:'Z2'},sr:{km:12,type:'Intervals',   zone:'Z4'}},
  {week:25,phase:'PEAK', lr:{km:35,zone:'Z2'},sr:{km:13,type:'RacePace',    zone:'Z3'}},
  {week:26,phase:'PEAK', lr:{km:27,zone:'Z2'},sr:{km:10,type:'Easy',        zone:'Z2'},deload:true},
  {week:27,phase:'PEAK', lr:{km:32,zone:'Z2'},sr:{km:12,type:'RacePace',    zone:'Z3'}},
  {week:28,phase:'TAPER',lr:{km:25,zone:'Z2'},sr:{km:10,type:'Tempo',       zone:'Z3'}},
  {week:29,phase:'TAPER',lr:{km:19,zone:'Z2'},sr:{km:8, type:'RacePace',    zone:'Z3'}},
  {week:30,phase:'TAPER',lr:{km:13,zone:'Z2'},sr:{km:6, type:'Easy+Strides',zone:'Z2'}},
  {week:31,phase:'TAPER',lr:null,             sr:{km:3, type:'Shakeout',    zone:'Z1'},raceWeek:true},
];

function _parseISO(s){const p=s.split('-').map(Number);return new Date(Date.UTC(p[0],p[1]-1,p[2]));}
function _toISO(d){return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
function _shift(d,n){return new Date(d.getTime()+n*86400000);}

const _w1Mon=_shift(_parseISO(PLAN_START),-DAY_IDX.LR); // 2026-04-06

const SCHEDULE=RAW_SCHEDULE.map(function(raw,i){
  const mon=_shift(_w1Mon,i*7);
  const sd=function(di){return _toISO(_shift(mon,di));};
  const sessions=[];
  sessions.push({date:sd(DAY_IDX.PP),dayIndex:DAY_IDX.PP,sessionType:'PP',auPlanned:STR_AU.PP});
  (function(){const{km,zone,type}=raw.sr;sessions.push({date:sd(DAY_IDX.SR),dayIndex:DAY_IDX.SR,sessionType:'SR',km,zone,type,auPlanned:km*ZONE_FACTOR[zone]});})();
  if(raw.lr){const{km,zone}=raw.lr;sessions.push({date:sd(DAY_IDX.LR),dayIndex:DAY_IDX.LR,sessionType:'LR',km,zone,auPlanned:km*ZONE_FACTOR[zone]});}
  if(raw.raceWeek){sessions.push({date:RACE_DATE,dayIndex:DAY_IDX.RACE,sessionType:'RACE',km:42.195,zone:'Z3',type:'Marathon',auPlanned:Math.round(42.195*ZONE_FACTOR.Z3*10)/10});}
  return Object.assign({},raw,{startDate:_toISO(mon),sessions});
});

function _load(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):{}}catch(e){return{};}}
function _save(){try{localStorage.setItem(LS_KEY,JSON.stringify(LOG));}catch(e){}}
const LOG=_load();

/** Return week whose sessions include isoDate, or null. */
function getWeekForDate(d){return SCHEDULE.find(w=>w.sessions.some(s=>s.date===d))??null;}
/** Mark session done. */
function markComplete(d,km,zone){if(!LOG[d])LOG[d]={};LOG[d].completed=true;if(km!==undefined)LOG[d].actualKm=km;if(zone!==undefined)LOG[d].actualZone=zone;_save();}
/** Mark session incomplete. */
function markIncomplete(d){if(!LOG[d])LOG[d]={};LOG[d].completed=false;_save();}
/** Return log entry or null. */
function getLog(d){return LOG[d]??null;}

window.APP={PLAN_START,RACE_DATE,WEEK_COUNT,SCHEDULE,LOG,getWeekForDate,markComplete,markIncomplete,getLog};
})();
</script>

<script>
/* ═══════════════════════════════════════════════════
   window.APP — Marathon Calendar UI
   Prompt 1 Step 4: no km/zone form  |  Prompt 2: fully tokenised, PLAN_PILL_COLORS
═══════════════════════════════════════════════════ */
(function(){
'use strict';
const APP=window.APP||{};
const SCHEDULE=APP.SCHEDULE||[];
const getLog=APP.getLog?APP.getLog.bind(APP):function(d){return(APP.LOG||{})[d]||null;};
const MS=86400000;
const WEEK_META=[];
const DATE_TO_WD=Object.create(null);
const SESS_BY_DATE=new Map();
const REPL_BY_DATE=new Map();
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

/* ── Prompt 2 Step 3: border-left colours per session type ── */
const PLAN_PILL_COLORS={
  LR:'#3b82f6',
  SR_Easy:'var(--success)',
  'SR_Easy+Strides':'var(--success)',
  SR_Tempo:'var(--accent)',
  SR_Intervals:'#8b5cf6',
  SR_RacePace:'var(--accent)',
  SR_Shakeout:'var(--success)',
  PP:'var(--accent)',
  RACE:'var(--accent)',
};
function pillColor(sessionType,srType){
  if(sessionType==='SR'&&srType){
    // Try exact key first, then prefix-match on first word
    const exact='SR_'+srType;
    if(PLAN_PILL_COLORS[exact])return PLAN_PILL_COLORS[exact];
    const word='SR_'+srType.split('+')[0];
    return PLAN_PILL_COLORS[word]||'var(--text-3)';
  }
  return PLAN_PILL_COLORS[sessionType]||'var(--text-3)';
}

function pISO(s){const p=s.split('-').map(Number);return new Date(Date.UTC(p[0],p[1]-1,p[2]));}
function tISO(d){return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
function shft(d,n){return new Date(d.getTime()+n*MS);}
function todayISO(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

const TODAY_ISO=todayISO();
const TODAY_D=pISO(TODAY_ISO);

function buildIndexes(){
  SCHEDULE.forEach(function(week,wi){
    const sess=Array.isArray(week.sessions)?week.sessions:[];
    sess.forEach(function(s){if(!s||!s.date)return;const l=SESS_BY_DATE.get(s.date)||[];l.push(s);SESS_BY_DATE.set(s.date,l);});
    if(!sess.length)return;
    let first=sess[0];
    for(let i=1;i<sess.length;i++){if(sess[i].date<first.date)first=sess[i];}
    const mon=shft(pISO(first.date),-(typeof first.dayIndex==='number'?first.dayIndex:0));
    const meta={wi,week,mon,startIso:tISO(mon),endIso:tISO(shft(mon,6))};
    WEEK_META[wi]=meta;
    for(let d=0;d<7;d++){DATE_TO_WD[tISO(shft(mon,d))]={wi,di:d};}
  });
}

function buildRepls(){
  if(!APP.detectMissedSessions)return;
  (APP.detectMissedSessions(TODAY_ISO)||[]).forEach(function(m){
    const act=m.replacementAction||{};
    if(!act.action||act.action.indexOf('MAKEUP')!==0||typeof act.day!=='number')return;
    const loc=DATE_TO_WD[m.date];if(!loc)return;
    const meta=WEEK_META[loc.wi];if(!meta)return;
    const iso=tISO(shft(meta.mon,act.day));
    const baseKm=typeof m.plannedKm==='number'?m.plannedKm:null;
    const mkm=typeof act.makeupKm==='number'?act.makeupKm:(baseKm!==null&&typeof act.distanceScale==='number'?Math.round(baseKm*act.distanceScale*10)/10:null);
    const l=REPL_BY_DATE.get(iso)||[];
    l.push({baseSessionType:m.sessionType,plannedKm:baseKm,zone:act.zone||m.plannedZone||null,makeupKm:mkm});
    REPL_BY_DATE.set(iso,l);
  });
}

function fmtRange(s,e){
  const sd=pISO(s),ed=pISO(e);
  const sM=MON[sd.getUTCMonth()],eM=MON[ed.getUTCMonth()];
  return sM===eM?sM+' '+sd.getUTCDate()+'\u2013'+ed.getUTCDate():sM+' '+sd.getUTCDate()+' \u2013 '+eM+' '+ed.getUTCDate();
}
function fmtShort(iso){const d=pISO(iso);return MON[d.getUTCMonth()]+' '+d.getUTCDate();}

function pillLabel(type,km,zone,srType,isRepl){
  // Returns [name, detail] for stacked pill display
  var name='',detail='';
  var kmStr=km!=null?km+' km':'';
  if(type==='LR'){
    name='Long Run';
    detail=[kmStr,zone].filter(Boolean).join(' · ');
  } else if(type==='SR'){
    name='Short Run & Prehab';
    detail=[kmStr,srType,zone].filter(Boolean).join(' · ');
  } else if(type==='PP'){
    name='Pull & Push';
    detail='';
  } else if(type==='RACE'){
    name='Race Day 🏁';
    detail=[kmStr?kmStr+' km':'42.2 km',zone].filter(Boolean).join(' · ');
  } else {
    name=type||'Session';
    detail=[kmStr,srType,zone].filter(Boolean).join(' · ');
  }
  if(isRepl) name='↩ '+name;
  return [name,detail];
}

function makePill(name,detail,color,state){
  const el=document.createElement('div');
  el.className='arc-session-pill'+(state?' arc-'+state:'');
  el.style.borderLeftColor=color;
  el.innerHTML='<span class="arc-pill-name">'+name+'</span>'
    +(detail?'<span class="arc-pill-detail">'+detail+'</span>':'');
  return el;
}

function renderDayInto(cell,iso){
  const dObj=pISO(iso);
  const isPast=dObj.getTime()<TODAY_D.getTime();
  const sessions=SESS_BY_DATE.get(iso)||[];
  const repls=REPL_BY_DATE.get(iso)||[];
  const log=getLog(iso);
  const done=!!(log&&log.completed);
  const body=cell.querySelector('.arc-day-body');
  const foot=cell.querySelector('.arc-day-footer');
  if(!body||!foot)return;
  body.innerHTML='';foot.innerHTML='';

  if(!sessions.length&&!repls.length){
    const r=document.createElement('div');r.className='arc-rest-label';r.textContent='Rest';
    body.appendChild(r);return;
  }

  const state=done?'completed':isPast?'missed':null;

  sessions.forEach(function(s){
    const col=pillColor(s.sessionType,s.type||null);
    const nd=pillLabel(s.sessionType,s.km!=null?s.km:null,s.zone,s.type,false);
    body.appendChild(makePill(nd[0],nd[1],col,state));
  });

  repls.forEach(function(r){
    const col=pillColor(r.baseSessionType,null);
    const km=r.makeupKm!=null?r.makeupKm:r.plannedKm;
    const nd=pillLabel(r.baseSessionType,km,r.zone,null,true);
    body.appendChild(makePill(nd[0],nd[1],col,'replacement'));
  });

  /* ── Checkbox only (P1 Step 4: no km/zone form) ── */
  const cid='arc-chk-'+iso;
  foot.innerHTML='<label for="'+cid+'" style="display:inline-flex;align-items:center;gap:5px;'
    +'font-size:12px;color:var(--text-2);cursor:pointer;font-family:var(--font-ui)">'
    +'<input type="checkbox" id="'+cid+'" class="arc-chk" data-date="'+iso+'"'
    +(done?' checked':'')
    +' style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer">'
    +'<span>Done</span></label>';
}

/* ── Prompt 2 Step 4: NO app-header; Prompt 2 Step 5: NO legend ── */
function renderCalendar(){
  const root=document.getElementById('calendar-root');
  if(!root)return;
  root.innerHTML='';
  const list=document.createElement('div');
  list.className='arc-calendar-list';

  WEEK_META.forEach(function(meta,wi){
    if(!meta)return;
    const wk=meta.week;
    const phase=wk.phase||'';
    const pCls=phase==='BASE'?'arc-phase-base':phase==='BUILD'?'arc-phase-build':
                phase==='PEAK'?'arc-phase-peak':phase==='TAPER'?'arc-phase-taper':'';
    const card=document.createElement('section');
    card.className='arc-week-card';
    card.setAttribute('data-week-index',String(wi));

    /* header */
    const hdr=document.createElement('div');hdr.className='arc-week-hdr';
    hdr.innerHTML='<div class="arc-week-title-group">'
      +'<div class="arc-week-title">Week '+(wk.week||(wi+1))+'</div>'
      +'<div class="arc-week-dates">'+fmtRange(meta.startIso,meta.endIso)+'</div>'
      +'</div>'
      +'<div class="arc-week-badges">'
      +'<span class="arc-badge arc-badge-phase '+pCls+'">'+phase+'</span>'
      +(wk.deload?'<span class="arc-badge arc-badge-deload">Deload</span>':'')
      +(wk.raceWeek?'<span class="arc-badge arc-badge-race">Race Week</span>':'')
      +'</div>';
    card.appendChild(hdr);

    /* day grid */
    const grid=document.createElement('div');grid.className='arc-day-grid';
    for(let d=0;d<7;d++){
      const iso=tISO(shft(meta.mon,d));
      const cell=document.createElement('div');
      cell.className='arc-day-cell'+(iso===TODAY_ISO?' arc-today':'');
      cell.setAttribute('data-date',iso);
      cell.innerHTML='<div class="arc-day-hdr">'
        +'<span class="arc-day-name">'+WD[d]+'</span>'
        +'<span class="arc-day-date">'+fmtShort(iso)+'</span>'
        +'</div>'
        +'<div class="arc-day-body"></div>'
        +'<div class="arc-day-footer"></div>';
      renderDayInto(cell,iso);
      grid.appendChild(cell);
    }
    card.appendChild(grid);
    list.appendChild(card);
  });
  root.appendChild(list);
}

function refreshDay(iso){
  const cell=document.querySelector('.arc-day-cell[data-date="'+iso+'"]');
  if(cell)renderDayInto(cell,iso);
}

function scrollToCurrentWeek(){
  const loc=DATE_TO_WD[TODAY_ISO];
  let idx=loc?loc.wi:0;
  if(!loc){for(let i=0;i<WEEK_META.length;i++){const m=WEEK_META[i];if(m&&TODAY_D>=m.mon&&TODAY_D<=shft(m.mon,6)){idx=i;break;}}}
  const card=document.querySelector('.arc-week-card[data-week-index="'+idx+'"]');
  if(card)card.scrollIntoView({behavior:'smooth',block:'start'});
}

/* checkbox handler — simplified (P1 Step 4) */
document.addEventListener('change',function(e){
  const t=e.target;
  if(!t.classList.contains('arc-chk'))return;
  const iso=t.getAttribute('data-date');
  if(t.checked){
    if(typeof APP.markComplete==='function')APP.markComplete(iso);
    if(typeof saveState==='function')saveState();
    if(typeof showToast==='function')showToast('Session marked complete ✓');
  } else {
    if(typeof APP.markIncomplete==='function')APP.markIncomplete(iso);
    if(typeof saveState==='function')saveState();
  }
  refreshDay(iso);
});

buildIndexes();
buildRepls();
APP.renderCalendar=renderCalendar;
APP.refreshDay=refreshDay;
APP.scrollToCurrentWeek=scrollToCurrentWeek;
window.APP=APP;
  // ── Re-render home on first load ─────────────────────────────────────────
  // scripts [4-6] may execute asynchronously when served in an iframe,
  // meaning renderHome() ran before SCHEDULE was ready. Re-render now that
  // window.APP.SCHEDULE is fully populated.
  (function(){
    var homeEl=document.getElementById('pg-home');
    if(homeEl&&homeEl.classList.contains('active')&&typeof renderHome==='function'){
      homeEl.innerHTML='';
      renderHome(homeEl);
      if(typeof lucide!=='undefined')lucide.createIcons();
    }
  })();
})();
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ─── PASTE YOUR CONFIG HERE ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            'AIzaSyAwLsPiJDJCu2DXl0lHy1IKODNQqQ2BCqI',
  authDomain:        'one-thing-after-another.firebaseapp.com',
  projectId:         'one-thing-after-another',
  storageBucket:     'one-thing-after-another.firebasestorage.app',

  appId:             '1:445239627912:web:363af0b4beab5b153e4f3d'
};
// ──────────────────────────────────────────────────────────────────────────

const configured = Object.values(firebaseConfig).every(v => typeof v === 'string' && v.trim() !== '');

const Cloud = {
  configured,
  ready: false,
  user: null,
  async signIn(){ throw new Error('Cloud not configured'); },
  async signOut(){},
  async saveDoc(){ throw new Error('Cloud not configured'); },
  async loadDoc(){ return null; },
  async deleteDoc(){}
};
window.Cloud = Cloud;

function emitAuthChanged(){
  try { window.dispatchEvent(new CustomEvent('cloud-auth-changed')); } catch(e){}
}

if (!configured) {
  console.info('Arete: firebaseConfig is blank — running on localStorage only.');
  emitAuthChanged();
} else {
  try {
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const userDoc = () => {
      if (!Cloud.user) throw new Error('Not signed in');
      return doc(db, 'users', Cloud.user.uid);   // single doc per user
    };

    Cloud.signIn    = () => signInWithPopup(auth, provider);
    Cloud.signOut   = () => fbSignOut(auth);
    Cloud.saveDoc   = (payload) => setDoc(userDoc(), payload);
    Cloud.loadDoc   = async () => { const snap = await getDoc(userDoc()); return snap.exists() ? snap.data() : null; };
    Cloud.deleteDoc = () => deleteDoc(userDoc());
    Cloud.ready     = true;

    onAuthStateChanged(auth, async (user) => {
      Cloud.user = user || null;
      emitAuthChanged();
      if (!user) return;
      // Prefer the remote doc; fall back to localStorage if it's absent/offline.
      try {
        await window.loadStateRemote();
        if (typeof window.generatePlan === 'function') window.generatePlan();
        if (typeof window.checkMissedRuns === 'function') window.checkMissedRuns(true);
        if (typeof window.applyTheme === 'function') window.applyTheme();
        if (typeof window.navigate === 'function') window.navigate(window.AppState?.ui?.tab || '#home');
        if (typeof window.showToast === 'function') window.showToast('Synced from your account');
      } catch(e) { console.warn('Arete: post-login sync failed', e); }
      emitAuthChanged();
    });
  } catch(e) {
    console.warn('Arete: Firebase init failed — continuing on localStorage only.', e);
    Cloud.ready = false;
    emitAuthChanged();
  }
}
</script>
